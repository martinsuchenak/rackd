openapi: 3.1.0
info:
  title: Rackd API
  description: Infrastructure management API for devices, networks, datacenters, and discovery
  version: 1.0.0
  contact:
    name: Rackd
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - bearerAuth: []

tags:
  - name: Datacenters
  - name: Networks
  - name: Pools
  - name: Devices
  - name: Dashboard
  - name: Relationships
  - name: Discovery
  - name: Credentials
  - name: Scan Profiles
  - name: Scheduled Scans
  - name: API Keys
  - name: Bulk Operations
  - name: Search
  - name: Audit
  - name: Auth
  - name: Users
  - name: Roles
  - name: OAuth
  - name: Conflicts
  - name: Reservations
  - name: Webhooks
  - name: Custom Fields
  - name: Circuits
  - name: NAT
  - name: DNS
  - name: Health

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 100
        maximum: 1000
    offsetParam:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
    idPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Error:
      type: object
      required: [code, error]
      properties:
        code:
          type: string
          description: "One of: INVALID_JSON, INVALID_INPUT, NOT_FOUND, FORBIDDEN, UNAUTHORIZED, INTERNAL_ERROR"
        error:
          type: string
        details:
          type: object
          additionalProperties: true

    Datacenter:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        location: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    DatacenterInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        location: { type: string }
        description: { type: string }

    Address:
      type: object
      properties:
        ip: { type: string }
        port: { type: integer, nullable: true }
        type: { type: string, enum: [ipv4, ipv6] }
        label: { type: string }
        network_id: { type: string, format: uuid }
        pool_id: { type: string, format: uuid }
        switch_port: { type: string }

    Device:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        hostname: { type: string }
        description: { type: string }
        make_model: { type: string }
        os: { type: string }
        datacenter_id: { type: string, format: uuid }
        username: { type: string }
        location: { type: string }
        tags:
          type: array
          items: { type: string }
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        domains:
          type: array
          items: { type: string }
        custom_fields: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    DeviceInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        hostname: { type: string }
        description: { type: string }
        make_model: { type: string }
        os: { type: string }
        datacenter_id: { type: string, format: uuid }
        username: { type: string }
        location: { type: string }
        tags:
          type: array
          items: { type: string }
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        domains:
          type: array
          items: { type: string }
        custom_fields: { type: object, additionalProperties: true }

    Network:
      type: object
      required: [id, name, subnet, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        subnet: { type: string, description: "CIDR notation" }
        vlan_id: { type: integer }
        datacenter_id: { type: string, format: uuid }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    NetworkInput:
      type: object
      required: [name, subnet]
      properties:
        name: { type: string }
        subnet: { type: string }
        vlan_id: { type: integer }
        datacenter_id: { type: string, format: uuid }
        description: { type: string }

    NetworkPool:
      type: object
      required: [id, network_id, name, start_ip, end_ip, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        network_id: { type: string, format: uuid }
        name: { type: string }
        start_ip: { type: string }
        end_ip: { type: string }
        description: { type: string }
        tags:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    PoolInput:
      type: object
      required: [name, start_ip, end_ip]
      properties:
        name: { type: string }
        start_ip: { type: string }
        end_ip: { type: string }
        description: { type: string }
        tags:
          type: array
          items: { type: string }

    NetworkUtilization:
      type: object
      properties:
        network_id: { type: string, format: uuid }
        total_ips: { type: integer }
        used_ips: { type: integer }
        available_ips: { type: integer }
        utilization: { type: number, format: float }

    NextIP:
      type: object
      properties:
        ip: { type: string }

    IPHeatmap:
      type: object
      properties:
        pool_id: { type: string, format: uuid }
        entries:
          type: array
          items:
            type: object
            properties:
              ip: { type: string }
              status: { type: string, enum: [available, used, reserved] }
              device_id: { type: string, format: uuid }
      additionalProperties: true

    DeviceRelationship:
      type: object
      required: [parent_id, child_id, type, created_at]
      properties:
        parent_id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        type: { type: string, enum: [contains, connected_to, depends_on] }
        notes: { type: string }
        created_at: { type: string, format: date-time }

    AddRelationshipRequest:
      type: object
      required: [child_id, type]
      properties:
        child_id: { type: string, format: uuid }
        type: { type: string, enum: [contains, connected_to, depends_on] }
        notes: { type: string }

    UpdateRelationshipRequest:
      type: object
      properties:
        notes: { type: string }

    ServiceInfo:
      type: object
      properties:
        port: { type: integer }
        protocol: { type: string }
        service: { type: string }
        version: { type: string }

    DiscoveredDevice:
      type: object
      properties:
        id: { type: string, format: uuid }
        ip: { type: string }
        mac_address: { type: string }
        hostname: { type: string }
        network_id: { type: string, format: uuid }
        status: { type: string }
        confidence: { type: integer, minimum: 0, maximum: 100 }
        os_guess: { type: string }
        vendor: { type: string }
        open_ports:
          type: array
          items: { type: integer }
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceInfo'
        first_seen: { type: string, format: date-time }
        last_seen: { type: string, format: date-time }
        promoted_to_device_id: { type: string, format: uuid }
        promoted_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    DiscoveryScan:
      type: object
      properties:
        id: { type: string, format: uuid }
        network_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, running, completed, failed, cancelled] }
        scan_type: { type: string, enum: [quick, full, deep] }
        total_hosts: { type: integer }
        scanned_hosts: { type: integer }
        found_hosts: { type: integer }
        progress_percent: { type: number, format: float }
        error_message: { type: string }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    StartScanRequest:
      type: object
      properties:
        scan_type:
          type: string
          enum: [quick, full, deep]
          default: quick
        profile_id: { type: string, format: uuid }
        credential_ids:
          type: array
          items: { type: string, format: uuid }

    PromoteRequest:
      type: object
      properties:
        name: { type: string }
        make_model: { type: string }
        datacenter_id: { type: string, format: uuid }

    DiscoveryRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        network_id: { type: string, format: uuid }
        enabled: { type: boolean }
        scan_type: { type: string, enum: [quick, full, deep] }
        interval_hours: { type: integer, minimum: 1 }
        exclude_ips: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    DiscoveryRuleInput:
      type: object
      required: [network_id, scan_type, interval_hours]
      properties:
        network_id: { type: string, format: uuid }
        enabled: { type: boolean, default: true }
        scan_type: { type: string, enum: [quick, full, deep] }
        interval_hours: { type: integer, minimum: 1 }
        exclude_ips: { type: string }

    Credential:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [snmp_v2c, snmp_v3, ssh_key, ssh_password] }
        ssh_username: { type: string }
        datacenter_id: { type: string, format: uuid }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    CredentialInput:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string, enum: [snmp_v2c, snmp_v3, ssh_key, ssh_password] }
        snmp_community: { type: string }
        snmp_v3_user: { type: string }
        snmp_v3_auth: { type: string }
        snmp_v3_priv: { type: string }
        ssh_username: { type: string }
        ssh_key_id: { type: string }
        datacenter_id: { type: string, format: uuid }
        description: { type: string }

    ScanProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        scan_type: { type: string, enum: [quick, full, deep, custom] }
        ports:
          type: array
          items: { type: integer }
        enable_snmp: { type: boolean }
        enable_ssh: { type: boolean }
        timeout_sec: { type: integer }
        max_workers: { type: integer, minimum: 1, maximum: 100 }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    ScanProfileInput:
      type: object
      required: [name, scan_type]
      properties:
        name: { type: string }
        scan_type: { type: string, enum: [quick, full, deep, custom] }
        ports:
          type: array
          items: { type: integer }
        enable_snmp: { type: boolean }
        enable_ssh: { type: boolean }
        timeout_sec: { type: integer }
        max_workers: { type: integer, minimum: 1, maximum: 100 }
        description: { type: string }

    ScheduledScan:
      type: object
      properties:
        id: { type: string, format: uuid }
        network_id: { type: string, format: uuid }
        profile_id: { type: string, format: uuid }
        name: { type: string }
        cron_expression: { type: string }
        enabled: { type: boolean }
        description: { type: string }
        last_run_at: { type: string, format: date-time }
        next_run_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    ScheduledScanInput:
      type: object
      required: [network_id, profile_id, name, cron_expression]
      properties:
        network_id: { type: string, format: uuid }
        profile_id: { type: string, format: uuid }
        name: { type: string }
        cron_expression: { type: string }
        enabled: { type: boolean, default: true }
        description: { type: string }

    APIKey:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
      additionalProperties: true

    APIKeyWithSecret:
      allOf:
        - $ref: '#/components/schemas/APIKey'
        - type: object
          required: [key]
          properties:
            key:
              type: string
              description: Secret key (only returned on creation)

    APIKeyInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        expires_at: { type: string, format: date-time }

    DashboardSummary:
      type: object
      additionalProperties: true
      properties:
        total_devices: { type: integer }
        total_networks: { type: integer }
        total_datacenters: { type: integer }
        recent_scans: { type: integer }

    DashboardTrend:
      type: object
      additionalProperties: true

    AuditLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
        action: { type: string }
        resource: { type: string }
        resource_id: { type: string }
        user_id: { type: string }
        username: { type: string }
        ip_address: { type: string }
        changes: { type: string }
        status: { type: string, enum: [success, failure] }
        error: { type: string }
      additionalProperties: true

    BulkResult:
      type: object
      properties:
        total: { type: integer }
        success: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: string }

    BulkDeleteRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: string, format: uuid }

    BulkTagsRequest:
      type: object
      required: [device_ids, tags]
      properties:
        device_ids:
          type: array
          items: { type: string, format: uuid }
        tags:
          type: array
          items: { type: string }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    LoginResponse:
      type: object
      properties:
        token: { type: string }
        expires_at: { type: string, format: date-time }
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string }
        display_name: { type: string }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    UserInput:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
        email: { type: string }
        display_name: { type: string }
        enabled: { type: boolean, default: true }

    UserUpdate:
      type: object
      properties:
        email: { type: string }
        display_name: { type: string }
        enabled: { type: boolean }

    PasswordChange:
      type: object
      required: [new_password]
      properties:
        current_password: { type: string }
        new_password: { type: string }

    RoleGrant:
      type: object
      required: [user_id, role_id]
      properties:
        user_id: { type: string, format: uuid }
        role_id: { type: string, format: uuid }

    Role:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        built_in: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    RoleInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        permissions:
          type: array
          items: { type: string }

    Permission:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        resource: { type: string }
        action: { type: string }

    OAuthClient:
      type: object
      properties:
        client_id: { type: string }
        client_name: { type: string }
        redirect_uris:
          type: array
          items: { type: string }
        grant_types:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
      additionalProperties: true

    OAuthRegisterRequest:
      type: object
      required: [client_name, redirect_uris]
      properties:
        client_name: { type: string }
        redirect_uris:
          type: array
          items: { type: string }
        grant_types:
          type: array
          items: { type: string }

    OAuthTokenRequest:
      type: object
      required: [grant_type]
      properties:
        grant_type: { type: string }
        code: { type: string }
        redirect_uri: { type: string }
        client_id: { type: string }
        client_secret: { type: string }
        code_verifier: { type: string }

    OAuthTokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string }
        expires_in: { type: integer }
        refresh_token: { type: string }

    Conflict:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        severity: { type: string, enum: [low, medium, high, critical] }
        description: { type: string }
        resource_type: { type: string }
        resource_id: { type: string, format: uuid }
        related_resource_id: { type: string, format: uuid }
        status: { type: string, enum: [open, resolved, dismissed] }
        resolved_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    ConflictSummary:
      type: object
      additionalProperties: true
      properties:
        total: { type: integer }
        by_severity: { type: object, additionalProperties: true }
        by_type: { type: object, additionalProperties: true }

    ResolveConflictRequest:
      type: object
      required: [resolution]
      properties:
        resolution: { type: string }
        notes: { type: string }

    Reservation:
      type: object
      properties:
        id: { type: string, format: uuid }
        ip: { type: string }
        pool_id: { type: string, format: uuid }
        description: { type: string }
        reserved_by: { type: string }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    ReservationInput:
      type: object
      required: [ip, pool_id]
      properties:
        ip: { type: string }
        pool_id: { type: string, format: uuid }
        description: { type: string }
        expires_at: { type: string, format: date-time }

    Webhook:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        url: { type: string, format: uri }
        secret: { type: string }
        events:
          type: array
          items: { type: string }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    WebhookInput:
      type: object
      required: [name, url, events]
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        secret: { type: string }
        events:
          type: array
          items: { type: string }
        enabled: { type: boolean, default: true }

    WebhookDelivery:
      type: object
      properties:
        id: { type: string, format: uuid }
        webhook_id: { type: string, format: uuid }
        event: { type: string }
        status_code: { type: integer }
        success: { type: boolean }
        request_body: { type: string }
        response_body: { type: string }
        delivered_at: { type: string, format: date-time }
      additionalProperties: true

    CustomField:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        label: { type: string }
        type: { type: string }
        required: { type: boolean }
        options:
          type: array
          items: { type: string }
        resource_type: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    CustomFieldInput:
      type: object
      required: [name, type, resource_type]
      properties:
        name: { type: string }
        label: { type: string }
        type: { type: string }
        required: { type: boolean, default: false }
        options:
          type: array
          items: { type: string }
        resource_type: { type: string }

    Circuit:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        provider: { type: string }
        circuit_id: { type: string }
        type: { type: string }
        bandwidth: { type: string }
        status: { type: string }
        a_side_device_id: { type: string, format: uuid }
        z_side_device_id: { type: string, format: uuid }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    CircuitInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        provider: { type: string }
        circuit_id: { type: string }
        type: { type: string }
        bandwidth: { type: string }
        status: { type: string }
        a_side_device_id: { type: string, format: uuid }
        z_side_device_id: { type: string, format: uuid }
        description: { type: string }

    NATRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [static, dynamic, pat] }
        source_ip: { type: string }
        translated_ip: { type: string }
        source_port: { type: integer }
        translated_port: { type: integer }
        protocol: { type: string }
        device_id: { type: string, format: uuid }
        description: { type: string }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    NATRuleInput:
      type: object
      required: [name, type, source_ip, translated_ip]
      properties:
        name: { type: string }
        type: { type: string, enum: [static, dynamic, pat] }
        source_ip: { type: string }
        translated_ip: { type: string }
        source_port: { type: integer }
        translated_port: { type: integer }
        protocol: { type: string }
        device_id: { type: string, format: uuid }
        description: { type: string }
        enabled: { type: boolean, default: true }

    DNSProvider:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string }
        config: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    DNSProviderInput:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string }
        config: { type: object, additionalProperties: true }

    DNSZone:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        provider_id: { type: string, format: uuid }
        type: { type: string, enum: [primary, secondary] }
        status: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    DNSZoneInput:
      type: object
      required: [name, provider_id]
      properties:
        name: { type: string }
        provider_id: { type: string, format: uuid }
        type: { type: string, enum: [primary, secondary] }
        description: { type: string }

    DNSRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [A, AAAA, CNAME, MX, TXT, NS, SRV, PTR] }
        value: { type: string }
        ttl: { type: integer }
        priority: { type: integer }
        device_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    DNSRecordInput:
      type: object
      required: [name, type, value]
      properties:
        zone_id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [A, AAAA, CNAME, MX, TXT, NS, SRV, PTR] }
        value: { type: string }
        ttl: { type: integer, default: 3600 }
        priority: { type: integer }

    DeviceStatusCounts:
      type: object
      additionalProperties: true

    SearchResult:
      type: object
      properties:
        devices:
          type: array
          items:
            $ref: '#/components/schemas/Device'
        networks:
          type: array
          items:
            $ref: '#/components/schemas/Network'
        datacenters:
          type: array
          items:
            $ref: '#/components/schemas/Datacenter'
      additionalProperties: true

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

