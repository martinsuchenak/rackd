<!-- Webhooks Management Page -->
<template x-if="route === '/webhooks'">
  <div x-data="webhookComponent()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">Webhooks</h1>
      <button x-show="$store.permissions.canCreate('webhooks')" @click="openCreateModal()"
        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]">
        Add Webhook
      </button>
    </div>

    <div x-show="error"
      class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800"
      role="alert" x-text="error"></div>

    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of webhooks with name, URL, events, and status</caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Name</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              URL</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Events</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Status</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="loading">
            <td colspan="5" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200"><span role="status"
                aria-live="polite">Loading webhooks...</span></td>
          </tr>
          <tr x-show="!loading && !hasWebhooks()">
            <td colspan="5" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">No webhooks configured.
              <button x-show="$store.permissions.canCreate('webhooks')" @click="openCreateModal()"
                class="text-blue-600 dark:text-blue-400 hover:underline cursor-pointer">Create your first
                webhook</button>
            </td>
          </tr>
          <template x-for="webhook in webhooks" :key="webhook.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <button x-show="$store.permissions.canUpdate('webhooks')" @click="openEditModal(webhook)"
                  class="font-medium text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors"
                  x-text="webhook.name"></button>
                <span x-show="!$store.permissions.canUpdate('webhooks')"
                  class="font-medium text-gray-900 dark:text-gray-100" x-text="webhook.name"></span>
                <div x-show="webhook.description" class="text-xs text-gray-500 dark:text-gray-400"
                  x-text="webhook.description"></div>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200 font-mono truncate max-w-xs" x-text="webhook.url"></td>
              <td class="px-6 py-4">
                <div class="flex flex-wrap gap-1">
                  <template x-for="event in webhook.events.slice(0, 3)" :key="event">
                    <span
                      class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-900 dark:bg-blue-900 dark:text-blue-200"
                      x-text="getEventLabel(event)"></span>
                  </template>
                  <span x-show="webhook.events.length > 3"
                    class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-900 dark:bg-gray-700 dark:text-gray-200"
                    x-text="' + ' + (webhook.events.length - 3)"></span>
                </div>
              </td>
              <td class="px-6 py-4">
                <span x-show="webhook.active"
                  class="px-2 py-1 text-xs font-medium rounded-full bg-green-100 text-green-900 dark:bg-green-900 dark:text-green-200">Active</span>
                <span x-show="!webhook.active"
                  class="px-2 py-1 text-xs font-medium rounded-full bg-gray-100 text-gray-900 dark:bg-gray-700 dark:text-gray-200">Inactive</span>
              </td>
              <td class="px-6 py-4 text-right">
                <div class="inline-flex gap-1">
                  <button @click="viewDeliveries(webhook)"
                    class="px-3 py-2 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="'View deliveries for ' + webhook.name">Deliveries</button>
                  <button @click="pingWebhook(webhook.id)"
                    class="px-3 py-2 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="'Test ' + webhook.name">Test</button>
                  <button x-show="$store.permissions.canUpdate('webhooks')" @click="openEditModal(webhook)"
                    class="px-3 py-2 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="'Edit ' + webhook.name">Edit</button>
                  <button x-show="$store.permissions.canDelete('webhooks')" @click="openDeleteModal(webhook)"
                    class="px-3 py-2 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="'Delete ' + webhook.name">Delete</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Create Webhook Modal -->
    <div x-show="showCreateModal" x-cloak :class="$store.ui.modalViewport()" role="dialog"
      aria-modal="true" aria-labelledby="create-modal-title" @keydown.escape.window="closeModal()">
      <div :class="$store.ui.modalBackdrop()" @click="closeModal()" aria-hidden="true"></div>
      <div :class="$store.ui.modalPanel('lg', true)"
        x-trap.inert.noscroll="showCreateModal">
        <button @click="closeModal()" :class="$store.ui.modalCloseButton()"
          aria-label="Close dialog">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <h2 id="create-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Create Webhook
        </h2>
        <form @submit.prevent="saveWebhook()">
          <div class="space-y-4">
            <div>
              <label for="create-name" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Name
                <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <input id="create-name" type="text" x-model="formData.name" required aria-required="true"
                :aria-invalid="!!validationErrors.name"
                :aria-describedby="validationErrors.name ? 'create-name-error' : undefined"
                class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                :class="validationErrors.name ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
              <p x-show="validationErrors.name" id="create-name-error"
                class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.name"></p>
            </div>
            <div>
              <label for="create-url" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">URL <span
                  aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <input id="create-url" type="url" x-model="formData.url" required aria-required="true"
                placeholder="https://example.com/webhook" :aria-invalid="!!validationErrors.url"
                :aria-describedby="validationErrors.url ? 'create-url-error' : undefined"
                class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                :class="validationErrors.url ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
              <p x-show="validationErrors.url" id="create-url-error" class="mt-1 text-sm text-red-700 dark:text-red-300"
                role="alert" x-text="validationErrors.url"></p>
            </div>
            <div>
              <label for="create-secret"
                class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Secret</label>
              <input id="create-secret" type="password" x-model="formData.secret"
                placeholder="Optional: used for HMAC signatures"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-2">Events <span
                  aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <div
                class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-3 bg-gray-50 dark:bg-gray-900 rounded-md border border-gray-300 dark:border-gray-600">
                <template x-for="eventType in eventTypes" :key="eventType.value">
                  <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" :checked="isEventSelected(eventType.value)"
                      @change="toggleEvent(eventType.value)"
                      class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm text-gray-700 dark:text-gray-300" x-text="eventType.label"></span>
                  </label>
                </template>
              </div>
              <p x-show="validationErrors.events" class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert"
                x-text="validationErrors.events"></p>
            </div>
            <div>
              <label for="create-description"
                class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
              <input id="create-description" type="text" x-model="formData.description"
                placeholder="Optional description"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            </div>
            <div class="flex items-center gap-2">
              <input type="checkbox" x-model="formData.active" id="create-active"
                class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
              <label for="create-active" class="text-sm text-gray-700 dark:text-gray-300">Active</label>
            </div>
          </div>
          <div class="flex justify-end gap-3 mt-6">
            <button type="button" @click="closeModal()"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
            <button type="submit" :disabled="saving"
              class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
              <span x-show="!saving">Create Webhook</span>
              <span x-show="saving">Creating...</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Edit Webhook Modal -->
    <template x-if="showEditModal && selectedWebhook">
      <div :class="$store.ui.modalViewport()" role="dialog" aria-modal="true"
        aria-labelledby="edit-modal-title" @keydown.escape.window="closeModal()">
        <div :class="$store.ui.modalBackdrop()" @click="closeModal()" aria-hidden="true"></div>
        <div :class="$store.ui.modalPanel('lg', true)"
          x-trap.inert.noscroll="true">
          <button @click="closeModal()" :class="$store.ui.modalCloseButton()"
            aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="edit-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Edit Webhook</h2>
          <form @submit.prevent="saveWebhook()">
            <div class="space-y-4">
              <div>
                <label :for="'edit-name-' + selectedWebhook.id"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Name <span
                    aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                <input :id="'edit-name-' + selectedWebhook.id" type="text" x-model="formData.name" required
                  aria-required="true" :aria-invalid="!!validationErrors.name"
                  class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                  :class="validationErrors.name ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
                <p x-show="validationErrors.name" class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert"
                  x-text="validationErrors.name"></p>
              </div>
              <div>
                <label :for="'edit-url-' + selectedWebhook.id"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">URL <span
                    aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                <input :id="'edit-url-' + selectedWebhook.id" type="url" x-model="formData.url" required
                  aria-required="true" :aria-invalid="!!validationErrors.url"
                  class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                  :class="validationErrors.url ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
                <p x-show="validationErrors.url" class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert"
                  x-text="validationErrors.url"></p>
              </div>
              <div>
                <label :for="'edit-secret-' + selectedWebhook.id"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Secret</label>
                <input :id="'edit-secret-' + selectedWebhook.id" type="password" x-model="formData.secret"
                  placeholder="Leave empty to keep current secret"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-2">Events <span
                    aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                <div
                  class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-3 bg-gray-50 dark:bg-gray-900 rounded-md border border-gray-300 dark:border-gray-600">
                  <template x-for="eventType in eventTypes" :key="eventType.value">
                    <label class="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" :checked="isEventSelected(eventType.value)"
                        @change="toggleEvent(eventType.value)"
                        class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                      <span class="text-sm text-gray-700 dark:text-gray-300" x-text="eventType.label"></span>
                    </label>
                  </template>
                </div>
                <p x-show="validationErrors.events" class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert"
                  x-text="validationErrors.events"></p>
              </div>
              <div>
                <label :for="'edit-description-' + selectedWebhook.id"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
                <input :id="'edit-description-' + selectedWebhook.id" type="text" x-model="formData.description"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
              </div>
              <div class="flex items-center gap-2">
                <input type="checkbox" x-model="formData.active" :id="'edit-active-' + selectedWebhook.id"
                  class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                <label :for="'edit-active-' + selectedWebhook.id"
                  class="text-sm text-gray-700 dark:text-gray-300">Active</label>
              </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
              <button type="button" @click="closeModal()"
                class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
              <button type="submit" :disabled="saving"
                class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
                <span x-show="!saving">Save Changes</span>
                <span x-show="saving">Saving...</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </template>

    <!-- Delete Confirmation Modal -->
    <include src="partials/modals/delete-confirm.html"></include>

    <!-- Deliveries Modal -->
    <template x-if="showDeliveriesModal && selectedWebhook">
      <div :class="$store.ui.modalViewport()" role="dialog" aria-modal="true"
        aria-labelledby="deliveries-modal-title" @keydown.escape.window="closeDeliveriesModal()">
        <div :class="$store.ui.modalBackdrop()" @click="closeDeliveriesModal()" aria-hidden="true"></div>
        <div :class="$store.ui.modalPanel('4xl', true)"
          x-trap.inert.noscroll="true">
          <button @click="closeDeliveriesModal()" :class="$store.ui.modalCloseButton()"
            aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="deliveries-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">
            Delivery History: <span x-text="getSelectedWebhookName()"></span>
          </h2>

          <div x-show="!deliveries || deliveries.length === 0" class="text-center py-8 text-gray-600 dark:text-gray-400">
            No delivery history yet. Test the webhook to create a delivery record.
          </div>

          <div x-show="deliveries && deliveries.length > 0" class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
              <thead class="bg-gray-50 dark:bg-gray-700">
                <tr>
                  <th scope="col"
                    class="px-4 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase">Time</th>
                  <th scope="col"
                    class="px-4 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase">Event
                  </th>
                  <th scope="col"
                    class="px-4 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase">Status
                  </th>
                  <th scope="col"
                    class="px-4 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase">Duration
                  </th>
                  <th scope="col"
                    class="px-4 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase">Attempts
                  </th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                <template x-for="delivery in deliveries" :key="delivery.id">
                  <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                    <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400"
                      x-text="formatDate(delivery.created_at)"></td>
                    <td class="px-4 py-3 text-sm text-gray-900 dark:text-gray-100 font-mono"
                      x-text="delivery.event_type"></td>
                    <td class="px-4 py-3">
                      <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium" :class="{
                              'bg-green-100 text-green-900 dark:bg-green-900 dark:text-green-200': delivery.status === 'success',
                              'bg-red-100 text-red-900 dark:bg-red-900 dark:text-red-200': delivery.status === 'failed',
                              'bg-yellow-100 text-yellow-900 dark:bg-yellow-900 dark:text-yellow-200': delivery.status === 'pending',
                              'bg-orange-100 text-orange-900 dark:bg-orange-900 dark:text-orange-200': delivery.status === 'retrying',
                              'bg-gray-100 text-gray-900 dark:bg-gray-700 dark:text-gray-200': delivery.status === 'abandoned'
                            }" x-text="delivery.status"></span>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400" x-text="delivery.duration_ms + 'ms'">
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400" x-text="delivery.attempt_number">
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>

          <div class="flex justify-end mt-6">
            <button @click="closeDeliveriesModal()"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Close</button>
          </div>
        </div>
      </div>
    </template>
  </div>
</template>
