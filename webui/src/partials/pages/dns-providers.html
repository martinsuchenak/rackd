<!-- DNS Providers Management Page -->
<template x-if="route === '/dns/providers'">
  <div x-data="dnsProvidersComponent()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">DNS Providers</h1>
      <button x-show="$store.permissions.canCreate('dns-provider')" @click="openCreateModal()"
        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]">
        Add Provider
      </button>
    </div>

    <div x-show="error"
      class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800"
      role="alert" x-text="error"></div>

    <!-- Filters -->
    <div class="mb-4 flex flex-wrap gap-4">
      <div>
        <label for="filter-type" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Type</label>
        <select id="filter-type" x-model="filterType" @change="applyFilters()"
          class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
          <option value="">All Types</option>
          <option value="technitium">Technitium</option>
          <option value="powerdns">PowerDNS</option>
          <option value="bind">BIND</option>
        </select>
      </div>
    </div>

    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of DNS providers with name, type, endpoint, and description</caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Name</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Type</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Endpoint</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Description</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Created</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="loading">
            <td colspan="6" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200"><span role="status"
                aria-live="polite">Loading DNS providers...</span></td>
          </tr>
          <tr x-show="!loading && !hasProviders()">
            <td colspan="6" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">No DNS providers configured.
              <button x-show="$store.permissions.canCreate('dns-provider')" @click="openCreateModal()"
                class="text-blue-600 dark:text-blue-400 hover:underline cursor-pointer">Create your first
                provider</button>
            </td>
          </tr>
          <template x-for="provider in providers" :key="provider.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <button x-show="$store.permissions.canUpdate('dns-provider')" @click="openEditModal(provider)"
                  class="font-medium text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors"
                  x-text="provider.name"></button>
                <span x-show="!$store.permissions.canUpdate('dns-provider')"
                  class="font-medium text-gray-900 dark:text-gray-100" x-text="provider.name"></span>
              </td>
              <td class="px-6 py-4">
                <span
                  class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-purple-100 text-purple-900 dark:bg-purple-900 dark:text-purple-200"
                  x-text="formatType(provider.type)"></span>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200 font-mono truncate max-w-xs" x-text="provider.endpoint"></td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200 truncate max-w-xs" x-text="getProviderDescription(provider)"></td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="formatDate(provider.created_at)"></td>
              <td class="px-6 py-4 text-right">
                <div class="inline-flex gap-1">
                  <button x-show="$store.permissions.canUpdate('dns-provider')" @click="openTestModal(provider)"
                    class="px-3 py-2 text-sm text-green-800 dark:text-green-200 hover:text-green-900 dark:hover:text-green-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-green-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="getProviderAriaLabel(provider.name, 'Test connection to')">Test</button>
                  <button x-show="$store.permissions.canUpdate('dns-provider')" @click="openEditModal(provider)"
                    class="px-3 py-2 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="getProviderAriaLabel(provider.name, 'Edit')">Edit</button>
                  <button x-show="$store.permissions.canDelete('dns-provider')" @click="openDeleteModal(provider)"
                    class="px-3 py-2 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="getProviderAriaLabel(provider.name, 'Delete')">Delete</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Create Provider Modal -->
    <div x-show="showCreateModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog"
      aria-modal="true" aria-labelledby="create-modal-title" @keydown.escape.window="closeModal()">
      <div class="fixed inset-0 bg-black/50" @click="closeModal()" aria-hidden="true"></div>
      <div
        class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6 max-h-[90vh] overflow-y-auto"
        x-trap.inert.noscroll="showCreateModal">
        <button @click="closeModal()"
          class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
          aria-label="Close dialog">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <h2 id="create-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Create DNS
          Provider</h2>
        <form @submit.prevent="saveProvider()">
          <div class="space-y-4">
            <div>
              <label for="create-name" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Name
                <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <input id="create-name" type="text" x-model="formData.name" required aria-required="true"
                :aria-invalid="!!validationErrors.name"
                :aria-describedby="getAriaDescribedBy('create-name-error', !!validationErrors.name)"
                :class="getInputClass(!!validationErrors.name)">
              <p x-show="validationErrors.name" id="create-name-error"
                class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.name"></p>
            </div>
            <div>
              <label for="create-type"
                class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Type</label>
              <select id="create-type" x-model="formData.type"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                <option value="technitium">Technitium</option>
                <option value="powerdns">PowerDNS</option>
                <option value="bind">BIND</option>
              </select>
            </div>
            <div>
              <label for="create-endpoint"
                class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Endpoint <span
                  aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <input id="create-endpoint" type="url" x-model="formData.endpoint" placeholder="https://dns.example.com"
                required aria-required="true" :aria-invalid="!!validationErrors.endpoint"
                :aria-describedby="getAriaDescribedBy('create-endpoint-error', !!validationErrors.endpoint)"
                :class="getInputClass(!!validationErrors.endpoint)">
              <p x-show="validationErrors.endpoint" id="create-endpoint-error"
                class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.endpoint"></p>
            </div>
            <div>
              <label for="create-token" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">API
                Token <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <input id="create-token" type="password" x-model="formData.token" required aria-required="true"
                :aria-invalid="!!validationErrors.token"
                :aria-describedby="getAriaDescribedBy('create-token-error', !!validationErrors.token)"
                :class="getInputClass(!!validationErrors.token)">
              <p x-show="validationErrors.token" id="create-token-error"
                class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.token"></p>
            </div>
            <div>
              <label for="create-description"
                class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
              <textarea id="create-description" x-model="formData.description" rows="2"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500"></textarea>
            </div>
          </div>
          <div class="flex justify-end gap-3 mt-6">
            <button type="button" @click="closeModal()"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
            <button type="submit" :disabled="saving"
              class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
              <span x-show="!saving">Create Provider</span>
              <span x-show="saving">Creating...</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Edit Provider Modal -->
    <template x-if="showEditModal && selectedProvider">
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true"
        aria-labelledby="edit-modal-title" @keydown.escape.window="closeModal()">
        <div class="fixed inset-0 bg-black/50" @click="closeModal()" aria-hidden="true"></div>
        <div
          class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6 max-h-[90vh] overflow-y-auto"
          x-trap.inert.noscroll="true">
          <button @click="closeModal()"
            class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="edit-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Edit DNS Provider
          </h2>
          <form @submit.prevent="saveProvider()">
            <div class="space-y-4">
              <div>
                <label :for="getEditInputId(selectedProvider.id, 'edit-name')"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Name <span
                    aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                <input :id="getEditInputId(selectedProvider.id, 'edit-name')" type="text" x-model="formData.name"
                  required aria-required="true" :aria-invalid="!!validationErrors.name"
                  :aria-describedby="getAriaDescribedBy(getEditInputId(selectedProvider.id, 'edit-name-error'), !!validationErrors.name)"
                  :class="getInputClass(!!validationErrors.name)">
                <p x-show="validationErrors.name" :id="getEditInputId(selectedProvider.id, 'edit-name-error')"
                  class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.name"></p>
              </div>
              <div>
                <label :for="getEditInputId(selectedProvider.id, 'edit-endpoint')"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Endpoint <span
                    aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                <input :id="getEditInputId(selectedProvider.id, 'edit-endpoint')" type="url" x-model="formData.endpoint"
                  required aria-required="true" :aria-invalid="!!validationErrors.endpoint"
                  :aria-describedby="getAriaDescribedBy(getEditInputId(selectedProvider.id, 'edit-endpoint-error'), !!validationErrors.endpoint)"
                  :class="getInputClass(!!validationErrors.endpoint)">
                <p x-show="validationErrors.endpoint" :id="getEditInputId(selectedProvider.id, 'edit-endpoint-error')"
                  class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.endpoint">
                </p>
              </div>
              <div>
                <label :for="getEditInputId(selectedProvider.id, 'edit-token')"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">API Token</label>
                <input :id="getEditInputId(selectedProvider.id, 'edit-token')" type="password" x-model="formData.token"
                  placeholder="Leave blank to keep existing"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Leave blank to keep the existing token</p>
              </div>
              <div>
                <label :for="getEditInputId(selectedProvider.id, 'edit-description')"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
                <textarea :id="getEditInputId(selectedProvider.id, 'edit-description')" x-model="formData.description"
                  rows="2"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500"></textarea>
              </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
              <button type="button" @click="closeModal()"
                class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
              <button type="submit" :disabled="saving"
                class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
                <span x-show="!saving">Save Changes</span>
                <span x-show="saving">Saving...</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </template>

    <!-- Test Connection Modal -->
    <template x-if="modalType === 'test' && selectedProvider">
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true"
        aria-labelledby="test-modal-title" @keydown.escape.window="closeModal()">
        <div class="fixed inset-0 bg-black/50" @click="closeModal()" aria-hidden="true"></div>
        <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full p-6"
          x-trap.inert.noscroll="true">
          <button @click="closeModal()"
            class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="test-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Test Connection
          </h2>
          <p class="text-gray-800 dark:text-gray-200 mb-4">Test connection to <strong
              x-text="getSelectedProviderName()"></strong>?</p>
          <div x-show="testResult" class="mb-4 p-3 rounded-md" :class="getTestResultClass()" role="alert">
            <p x-text="getTestResultMessage()"></p>
          </div>
          <div class="flex justify-end gap-3">
            <button @click="closeModal()"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Close</button>
            <button @click="doTestConnection()" :disabled="testingConnection"
              class="px-4 py-2 text-sm bg-green-600 text-white rounded-md hover:bg-green-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-green-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
              <span x-show="!testingConnection">Test Connection</span>
              <span x-show="testingConnection">Testing...</span>
            </button>
          </div>
        </div>
      </div>
    </template>

    <!-- Delete Confirmation Modal -->
    <template x-if="showDeleteModal && selectedProvider">
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4" role="alertdialog" aria-modal="true"
        aria-labelledby="delete-confirm-title" aria-describedby="delete-confirm-desc"
        @keydown.escape.window="closeDeleteModal()">
        <div class="fixed inset-0 bg-black/50" @click="closeDeleteModal()" aria-hidden="true"></div>
        <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full p-6"
          x-trap.inert.noscroll="true">
          <button @click="closeDeleteModal()"
            class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="delete-confirm-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Delete DNS
            Provider</h2>
          <p id="delete-confirm-desc" class="text-gray-800 dark:text-gray-200 mb-6">
            Are you sure you want to delete <strong x-text="getSelectedProviderName()"></strong>? This
            action cannot be undone.
          </p>
          <div class="flex justify-end gap-3">
            <button @click="closeDeleteModal()"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
            <button @click="doDeleteProvider()" :disabled="deleting"
              class="px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
              <span x-show="!deleting">Delete</span>
              <span x-show="deleting">Deleting...</span>
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>
</template>
