<!-- Discovery -->
<template x-if="route === '/discovery'">
  <div x-data="discoveryList()" @beforeunload.window="destroy()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Discovery</h1>
      <button @click="openScanModal()"
        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        New Scan
      </button>
    </div>

    <div x-show="error" class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 rounded-md"
      x-text="error"></div>

    <div class="mb-4 flex flex-wrap gap-4 items-center">
      <select @change="selectNetwork($event.target.value)"
        class="px-3 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">All Networks</option>
        <template x-for="n in networks" :key="n.id">
          <option :value="n.id" x-text="n.name + ' (' + n.subnet + ')'"></option>
        </template>
      </select>
      <div class="text-sm text-gray-500 dark:text-gray-400" x-text="getDiscoveredDevicesCountLabel()"></div>
    </div>

    <div class="space-y-6">
      <!-- Scans Section -->
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
          <span class="font-semibold text-gray-900 dark:text-white">Recent Scans</span>
          <button x-show="hasOldScans()" @click="deleteOldScans()"
            class="text-xs text-red-600 dark:text-red-400 hover:underline">
            Delete Old
          </button>
        </div>
        <div class="p-4 max-h-64 overflow-y-auto">
          <p x-show="loading" class="text-gray-500">Loading...</p>
          <p x-show="!loading && !hasScans()" class="text-gray-500">No scans found</p>
          <div class="space-y-2">
            <template x-for="s in scans" :key="s.id">
              <div class="p-3 border border-gray-200 dark:border-gray-700 rounded-md">
                <div class="flex justify-between items-center">
                  <div class="flex-1">
                    <div class="text-gray-900 dark:text-white" x-text="s.network_id"></div>
                    <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                      <span x-text="s.scan_type + ' scan'"></span>
                      <span x-show="hasScanProgress(s)" class="ml-2">
                        <span x-text="Math.round(s.progress_percent)"></span>%
                      </span>
                      <span x-show="hasScanHosts(s)" class="ml-2">
                        <span x-text="s.scanned_hosts"></span>/<span x-text="s.total_hosts"></span> hosts
                      </span>
                      <span x-show="hasFoundHosts(s)" class="ml-2 text-green-600 dark:text-green-400">
                        <span x-text="s.found_hosts"></span> found
                      </span>
                    </div>
                  </div>
                  <div class="flex items-center gap-2 ml-4">
                    <template x-if="s.status === 'running' || s.status === 'pending'">
                      <button @click="cancelScan(s.id)" :disabled="isCancelling(s.id)"
                        class="px-2 py-0.5 text-xs rounded-md bg-red-100 text-red-700 hover:bg-red-200 dark:bg-red-900/30 dark:text-red-400 dark:hover:bg-red-900/50 disabled:opacity-50 disabled:cursor-not-allowed"
                        x-text="isCancelling(s.id) ? 'Stopping...' : 'Stop'">
                      </button>
                    </template>
                    <template x-if="s.status === 'completed' || s.status === 'failed'">
                      <button @click="deleteScan(s.id)"
                        class="px-2 py-0.5 text-xs rounded-md text-gray-500 hover:text-red-600 dark:text-gray-400 dark:hover:text-red-400">
                        Delete
                      </button>
                    </template>
                    <span class="px-2 py-0.5 text-xs rounded-full" :class="getScanStatusClass(s.status)"
                      x-text="s.status"></span>
                  </div>
                </div>
                <div x-show="s.error_message" class="text-xs text-red-600 dark:text-red-400 mt-1"
                  x-text="s.error_message"></div>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Discovered Devices Section -->
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
          <span class="font-semibold text-gray-900 dark:text-white">Discovered Devices</span>
          <div class="flex items-center gap-2">
            <input type="text" x-model="deviceFilter" placeholder="Filter devices..."
              class="px-3 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 w-48">
            <button x-show="hasDiscoveredDevices()" @click="deleteAllDevices()"
              class="text-xs text-red-600 dark:text-red-400 hover:underline">
              Delete All
            </button>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
            <thead class="bg-gray-50 dark:bg-gray-900">
              <tr>
                <th
                  class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                  IP Address</th>
                <th
                  class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                  Hostname</th>
                <th
                  class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                  MAC Address</th>
                <th
                  class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                  OS</th>
                <th
                  class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                  Vendor</th>
                <th
                  class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                  Open Ports</th>
                <th
                  class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                  Services</th>
                <th
                  class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                  Last Seen</th>
                <th
                  class="px-4 py-3 text-center text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                  Conf.</th>
                <th
                  class="px-4 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                  Actions</th>
              </tr>
            </thead>
            <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
              <p x-show="loading" class="text-gray-500 py-4">Loading...</p>
              <tr x-show="!loading && !filteredDevices.length">
                <td colspan="10" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">
                  No discovered devices found
                </td>
              </tr>
              <template x-for="d in filteredDevices" :key="d.id">
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                  <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white"
                    x-text="d.ip"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-700 dark:text-gray-300"
                    x-text="d.hostname || '-'"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400"
                    x-text="d.mac_address || '-'"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-700 dark:text-gray-300"
                    x-text="d.os_guess || '-'"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400"
                    x-text="d.vendor || '-'"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm">
                    <template x-if="hasPortCount(d, 0)">
                      <div class="flex flex-wrap gap-1">
                        <template x-for="port in d.open_ports.slice(0, 6)" :key="port">
                          <span
                            class="px-1.5 py-0.5 text-xs rounded bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400"
                            x-text="port"></span>
                        </template>
                        <template x-if="hasPortCount(d, 6)">
                          <span
                            class="px-1.5 py-0.5 text-xs rounded bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400"
                            x-text="'+' + getPortRemainingCount(d, 6)"></span>
                        </template>
                      </div>
                    </template>
                    <template x-if="!hasPortCount(d, 0)">
                      <span class="text-sm text-gray-400">-</span>
                    </template>
                  </td>
                  <td class="px-4 py-3 text-sm">
                    <template x-if="hasServiceCount(d, 0)">
                      <div class="flex flex-wrap gap-1">
                        <template x-for="svc in d.services.slice(0, 4)" :key="svc.port + svc.service">
                          <span
                            class="px-1.5 py-0.5 text-xs rounded bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400"
                            x-text="svc.service"
                            :title="svc.protocol + '/' + svc.port + (svc.version ? ' ' + svc.version : '')">
                          </span>
                        </template>
                        <template x-if="hasServiceCount(d, 4)">
                          <span
                            class="px-1.5 py-0.5 text-xs rounded bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400"
                            x-text="'+' + getServiceRemainingCount(d, 4)"></span>
                        </template>
                      </div>
                    </template>
                    <template x-if="!hasServiceCount(d, 0)">
                      <span class="text-sm text-gray-400">-</span>
                    </template>
                  </td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400"
                    x-text="formatDate(d.last_seen)"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-center text-sm">
                    <span class="px-2 py-0.5 text-xs rounded-full" :class="getConfidenceBadgeClass(d.confidence)"
                      x-text="d.confidence + '/' + 10">
                    </span>
                  </td>
                  <td class="px-4 py-3 whitespace-nowrap text-right text-sm">
                    <div class="flex justify-end gap-2">
                      <button @click="openPromoteModal(d)" x-show="!d.promoted_to_device_id"
                        class="text-blue-600 dark:text-blue-400 hover:underline text-sm">
                        Promote
                      </button>
                      <button @click="deleteDevice(d.id)"
                        class="text-red-600 dark:text-red-400 hover:underline text-sm">
                        Delete
                      </button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Scan Modal -->
    <include src="partials/modals/discovery-scan.html"></include>
    <!-- Promote Modal -->
    <include src="partials/modals/discovery-promote.html"></include>
  </div>
</template>
