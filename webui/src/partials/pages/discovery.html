<!-- Discovery -->
<template x-if="route === '/discovery'">
  <div x-data="discoveryList" @beforeunload.window="destroy()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Discovery</h1>
      <button @click="openScanModal()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        New Scan
      </button>
    </div>
    <div x-show="error" class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 rounded-md" x-text="error"></div>
    <div class="mb-4">
      <select @change="selectNetwork($event.target.value)"
              class="px-3 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">All Networks</option>
        <template x-for="n in networks" :key="n.id">
          <option :value="n.id" x-text="n.name + ' (' + n.subnet + ')'"></option>
        </template>
      </select>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 font-semibold text-gray-900 dark:text-white">Recent Scans</div>
        <div class="p-4">
          <p x-show="loading" class="text-gray-500">Loading...</p>
          <p x-show="!loading && scans.length === 0" class="text-gray-500">No scans found</p>
          <div class="space-y-2">
            <template x-for="s in scans.slice(0, 10)" :key="s.id">
              <div class="p-3 border border-gray-200 dark:border-gray-700 rounded-md">
                <div class="flex justify-between items-center">
                  <span class="text-gray-900 dark:text-white" x-text="s.network_id"></span>
                  <span class="px-2 py-0.5 text-xs rounded-full"
                        :class="{
                          'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400': s.status === 'pending',
                          'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400': s.status === 'running',
                          'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400': s.status === 'completed',
                          'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400': s.status === 'failed'
                        }"
                        x-text="s.status"></span>
                </div>
                <div class="text-xs text-gray-500 dark:text-gray-400 mt-1" x-text="s.scan_type + ' scan'"></div>
              </div>
            </template>
          </div>
        </div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 font-semibold text-gray-900 dark:text-white">Discovered Devices</div>
        <div class="p-4">
          <p x-show="loading" class="text-gray-500">Loading...</p>
          <p x-show="!loading && discoveredDevices.length === 0" class="text-gray-500">No discovered devices</p>
          <div class="space-y-2">
            <template x-for="d in discoveredDevices.slice(0, 10)" :key="d.id">
              <div class="flex justify-between items-center p-3 border border-gray-200 dark:border-gray-700 rounded-md">
                <div>
                  <div class="text-gray-900 dark:text-white" x-text="d.ip"></div>
                  <div class="text-xs text-gray-500 dark:text-gray-400" x-text="d.hostname || 'Unknown hostname'"></div>
                </div>
                <button @click="openPromoteModal(d)" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">Promote</button>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
    <!-- Scan Modal -->
    <include src="partials/modals/discovery-scan.html"></include>
    <!-- Promote Modal -->
    <include src="partials/modals/discovery-promote.html"></include>
  </div>
</template>
