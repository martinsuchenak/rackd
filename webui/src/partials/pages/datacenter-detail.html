<div x-data="datacenterDetail()">
  <div x-show="loading" class="text-gray-500">Loading...</div>
  <div x-show="error" class="p-4 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 rounded-md"
    x-text="error"></div>
  <div x-show="!loading && datacenter">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center">
        <button @click="$dispatch('nav', '/datacenters')"
          class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 mr-2">&larr;</button>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white" x-text="getDatacenterName()"></h1>
      </div>
      <div class="flex gap-2">
        <button x-show="$store.permissions.canUpdate('datacenters')" @click="openEditModal()"
          class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700">Edit</button>
        <button x-show="$store.permissions.canDelete('datacenters')" @click="confirmDelete()"
          class="px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700">Delete</button>
      </div>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6">
      <dl class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <dt class="text-sm text-gray-500 dark:text-gray-400">Location</dt>
          <dd class="font-medium text-gray-900 dark:text-white" x-text="getDatacenterLocation()"></dd>
        </div>
        <div>
          <dt class="text-sm text-gray-500 dark:text-gray-400">Description</dt>
          <dd class="font-medium text-gray-900 dark:text-white" x-text="getDatacenterDescription()">
          </dd>
        </div>
      </dl>
      <div class="mt-6" x-show="hasDevices()">
        <h3 class="text-sm text-gray-500 dark:text-gray-400 mb-2">Devices (<span x-text="devices.length"></span>)</h3>
        <ul class="space-y-1">
          <template x-for="d in devices.slice(0, 10)" :key="d.id">
            <li class="flex items-center gap-2">
              <a :href="'/devices/detail?id=' + d.id" @click.prevent="$dispatch('nav', '/devices/detail?id=' + d.id)"
                class="text-blue-600 dark:text-blue-400 hover:underline" x-text="d.name"></a>
              <span class="text-xs text-gray-500 dark:text-gray-400" x-text="'(' + getDeviceIP(d) + ')'"></span>
            </li>
          </template>
          <li x-show="hasMoreDevices()" class="text-gray-500">...and <span x-text="getMoreDevicesCount()"></span> more
          </li>
        </ul>
      </div>
    </div>
  </div>
  <!-- Delete Modal -->
  <include src="partials/modals/delete-confirm.html"></include>
  <!-- Edit Modal -->
  <div x-show="showEditModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-black/50" @click="closeEditModal()"></div>
    <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Edit Datacenter</h3>
      <form @submit.prevent="saveDatacenter()">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Name *</label>
            <input type="text" x-model="editDatacenter.name" required
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Location</label>
            <input type="text" x-model="editDatacenter.location"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Description</label>
            <textarea x-model="editDatacenter.description" rows="3"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button type="button" @click="closeEditModal()"
            class="px-4 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">Cancel</button>
          <button type="submit" :disabled="saving"
            class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50">
            <span x-show="!saving">Save Changes</span>
            <span x-show="saving">Saving...</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
