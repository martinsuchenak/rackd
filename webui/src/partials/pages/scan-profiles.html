<!-- Scan Profiles -->
<template x-if="route === '/scan-profiles'">
  <div x-data="scanProfilesList()" @beforeunload.window="destroy()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">Scan Profiles</h1>
      <button @click="openCreateModal()"
              x-show="$store.permissions.canCreate('scan-profiles')"
              class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]">
        New Profile
      </button>
    </div>

    <div x-show="error" class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800" role="alert" x-text="error"></div>

    <div x-show="loading" class="text-gray-500">Loading...</div>

    <div x-show="!loading" class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of scan profiles with name, type, services, and settings</caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">Name</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">Type</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">Services</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">Timeout</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">Workers</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="profiles.length === 0"><td colspan="6" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">No scan profiles found. Create a profile to customize your discovery scans.</td></tr>
          <template x-for="p in profiles" :key="p.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <button x-show="$store.permissions.canUpdate('scan-profiles')" @click="openEditModal(p)"
                  class="font-medium text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors"
                  x-text="p.name"></button>
                <span x-show="!$store.permissions.canUpdate('scan-profiles')"
                  class="font-medium text-gray-900 dark:text-gray-50" x-text="p.name"></span>
                <div x-show="p.description" class="text-xs text-gray-500 dark:text-gray-400 mt-0.5" x-text="p.description"></div>
              </td>
              <td class="px-6 py-4">
                <span class="px-2 py-1 text-xs font-medium rounded-full"
                      :class="{
                        'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400': p.scan_type === 'quick',
                        'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-400': p.scan_type === 'full',
                        'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400': p.scan_type === 'deep',
                        'bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-400': p.scan_type === 'custom'
                      }"
                      x-text="p.scan_type.toUpperCase()">
                </span>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200">
                <span x-show="!p.enable_snmp && !p.enable_ssh" class="text-gray-500 dark:text-gray-400">-</span>
                <span x-show="p.enable_snmp || p.enable_ssh">
                  <span x-show="p.enable_snmp">SNMP</span><span x-show="p.enable_snmp && p.enable_ssh">, </span><span x-show="p.enable_ssh">SSH</span>
                </span>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="p.timeout_sec + 's'"></td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="p.max_workers"></td>
              <td class="px-6 py-4 text-right">
                <div class="inline-flex gap-1">
                  <button x-show="$store.permissions.canUpdate('scan-profiles')" @click="openEditModal(p)" class="px-3 py-2 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]" :aria-label="'Edit ' + p.name">Edit</button>
                  <button x-show="$store.permissions.canDelete('scan-profiles')" @click="deleteProfile(p.id)" class="px-3 py-2 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]" :aria-label="'Delete ' + p.name">Delete</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Create Modal -->
    <div x-show="showCreateModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div class="fixed inset-0 bg-black/50" @click="showCreateModal = false"></div>
      <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">New Scan Profile</h3>
        <form @submit.prevent="createProfile()">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Profile Name *</label>
              <input type="text" x-model="formName" required
                     class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Scan Type</label>
              <select x-model="formScanType" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="quick">Quick (default ports)</option>
                <option value="full">Full (extended ports)</option>
                <option value="deep">Deep (top 100 ports)</option>
                <option value="custom">Custom (specify ports)</option>
              </select>
            </div>
            <template x-if="formScanType === 'custom'">
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Ports (comma-separated)</label>
                <input type="text" x-model="formPorts"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="22,80,443,3389">
              </div>
            </template>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                  <input type="checkbox" x-model="formEnableSNMP" class="rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
                  Enable SNMP
                </label>
              </div>
              <div>
                <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                  <input type="checkbox" x-model="formEnableSSH" class="rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
                  Enable SSH
                </label>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Timeout (seconds)</label>
                <input type="number" x-model="formTimeoutSec" min="1" max="60"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Max Workers</label>
                <input type="number" x-model="formMaxWorkers" min="1" max="100"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
              <textarea x-model="formDescription" rows="3"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Optional description of this profile"></textarea>
            </div>
          </div>
          <div class="flex justify-end gap-3 mt-6">
            <button type="button" @click="showCreateModal = false" class="px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">Cancel</button>
            <button type="submit" :disabled="loading" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50">
              <span x-show="!loading">Create Profile</span>
              <span x-show="loading">Creating...</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Edit Modal -->
    <div x-show="showEditModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div class="fixed inset-0 bg-black/50" @click="showEditModal = false"></div>
      <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Edit Scan Profile</h3>
        <form @submit.prevent="updateProfile()">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Profile Name *</label>
              <input type="text" x-model="formName" required
                     class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Scan Type</label>
              <select x-model="formScanType" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="quick">Quick (default ports)</option>
                <option value="full">Full (extended ports)</option>
                <option value="deep">Deep (top 100 ports)</option>
                <option value="custom">Custom (specify ports)</option>
              </select>
            </div>
            <template x-if="formScanType === 'custom'">
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Ports (comma-separated)</label>
                <input type="text" x-model="formPorts"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="22,80,443,3389">
              </div>
            </template>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                  <input type="checkbox" x-model="formEnableSNMP" class="rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
                  Enable SNMP
                </label>
              </div>
              <div>
                <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                  <input type="checkbox" x-model="formEnableSSH" class="rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700">
                  Enable SSH
                </label>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Timeout (seconds)</label>
                <input type="number" x-model="formTimeoutSec" min="1" max="60"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Max Workers</label>
                <input type="number" x-model="formMaxWorkers" min="1" max="100"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
              <textarea x-model="formDescription" rows="3"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Optional description of this profile"></textarea>
            </div>
          </div>
          <div class="flex justify-end gap-3 mt-6">
            <button type="button" @click="closeEditModal()" class="px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">Cancel</button>
            <button type="submit" :disabled="loading" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50">
              <span x-show="!loading">Update Profile</span>
              <span x-show="loading">Updating...</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</template>
