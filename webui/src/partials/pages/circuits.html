<!-- Circuits Management Page -->
<template x-if="route === '/circuits'">
  <div x-data="circuitComponent()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">Circuits</h1>
      <button x-show="$store.permissions.canCreate('circuits')" @click="openCreateModal()"
        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]">
        Add Circuit
      </button>
    </div>

    <div x-show="error"
      class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800"
      role="alert" x-text="error"></div>

    <!-- Filters -->
    <div class="mb-4 flex flex-wrap gap-4">
      <div>
        <label for="filter-provider"
          class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Provider</label>
        <select id="filter-provider" x-model="filterProvider" @change="applyFilters()"
          class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
          <option value="">All Providers</option>
          <template x-for="provider in getProviders()" :key="provider">
            <option :value="provider" x-text="provider"></option>
          </template>
        </select>
      </div>
      <div>
        <label for="filter-status"
          class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Status</label>
        <select id="filter-status" x-model="filterStatus" @change="applyFilters()"
          class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="maintenance">Maintenance</option>
          <option value="down">Down</option>
          <option value="decommissioned">Decommissioned</option>
        </select>
      </div>
      <div>
        <label for="filter-type" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Type</label>
        <select id="filter-type" x-model="filterType" @change="applyFilters()"
          class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
          <option value="">All Types</option>
          <option value="fiber">Fiber</option>
          <option value="copper">Copper</option>
          <option value="microwave">Microwave</option>
          <option value="dark_fiber">Dark Fiber</option>
        </select>
      </div>
    </div>

    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of circuits with name, provider, type, status, and endpoints</caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Name</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Circuit ID</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Provider</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Type</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Capacity</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Status</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Endpoints</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="loading">
            <td colspan="8" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200"><span role="status"
                aria-live="polite">Loading circuits...</span></td>
          </tr>
          <tr x-show="!loading && !hasCircuits()">
            <td colspan="8" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">No circuits configured.
              <button x-show="$store.permissions.canCreate('circuits')" @click="openCreateModal()"
                class="text-blue-600 dark:text-blue-400 hover:underline cursor-pointer">Create your first
                circuit</button>
            </td>
          </tr>
          <template x-for="circuit in circuits" :key="circuit.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <button x-show="$store.permissions.canUpdate('circuits')" @click="openEditModal(circuit)"
                  class="font-medium text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors"
                  x-text="circuit.name"></button>
                <span x-show="!$store.permissions.canUpdate('circuits')"
                  class="font-medium text-gray-900 dark:text-gray-100" x-text="circuit.name"></span>
                <div x-show="circuit.description" class="text-xs text-gray-500 dark:text-gray-400"
                  x-text="circuit.description"></div>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200 font-mono" x-text="circuit.circuit_id"></td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="circuit.provider"></td>
              <td class="px-6 py-4">
                <span
                  class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-900 dark:bg-blue-900 dark:text-blue-200"
                  x-text="formatType(circuit.type)"></span>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200">
                <span x-show="circuit.capacity_mbps" x-text="circuit.capacity_mbps + ' Mbps'"></span>
                <span x-show="!circuit.capacity_mbps" class="text-gray-400 dark:text-gray-500">-</span>
              </td>
              <td class="px-6 py-4">
                <span class="px-2 py-1 text-xs font-medium rounded-full" :class="{
                        'bg-green-100 text-green-900 dark:bg-green-900 dark:text-green-200': circuit.status === 'active',
                        'bg-yellow-100 text-yellow-900 dark:bg-yellow-900 dark:text-yellow-200': circuit.status === 'maintenance',
                        'bg-gray-100 text-gray-900 dark:bg-gray-700 dark:text-gray-200': circuit.status === 'down',
                        'bg-red-100 text-red-900 dark:bg-red-900 dark:text-red-200': circuit.status === 'decommissioned'
                      }" x-text="formatStatus(circuit.status)"></span>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200">
                <span x-show="circuit && (circuit.datacenter_a_id || circuit.datacenter_b_id)">
                  <span x-text="getDatacenterName(circuit.datacenter_a_id)"></span>
                  <span x-show="circuit && circuit.datacenter_a_id && circuit.datacenter_b_id"> ↔ </span>
                  <span x-text="getDatacenterName(circuit.datacenter_b_id)"></span>
                </span>
                <span x-show="circuit && !circuit.datacenter_a_id && !circuit.datacenter_b_id" class="text-gray-400 dark:text-gray-500">-</span>
              </td>
              <td class="px-6 py-4 text-right">
                <div class="inline-flex gap-1">
                  <button x-show="$store.permissions.canUpdate('circuits')" @click="openEditModal(circuit)"
                    class="px-3 py-2 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="'Edit ' + circuit.name">Edit</button>
                  <button x-show="$store.permissions.canDelete('circuits')" @click="openDeleteModal(circuit)"
                    class="px-3 py-2 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="'Delete ' + circuit.name">Delete</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Create Circuit Modal -->
    <div x-show="showCreateModal" x-cloak :class="$store.ui.modalViewport()" role="dialog"
      aria-modal="true" aria-labelledby="create-modal-title" @keydown.escape.window="closeModal()">
      <div :class="$store.ui.modalBackdrop()" @click="closeModal()" aria-hidden="true"></div>
      <div :class="$store.ui.modalPanel('2xl', true)"
        x-trap.inert.noscroll="showCreateModal">
        <button @click="closeModal()" :class="$store.ui.modalCloseButton()"
          aria-label="Close dialog">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <h2 id="create-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Create Circuit
        </h2>
        <form @submit.prevent="saveCircuit()">
          <div class="space-y-4">
            <!-- Basic Info -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label for="create-name" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Name
                  <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                <input id="create-name" type="text" x-model="formData.name" required aria-required="true"
                  :aria-invalid="!!validationErrors.name"
                  :aria-describedby="validationErrors.name ? 'create-name-error' : undefined"
                  class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                  :class="validationErrors.name ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
                <p x-show="validationErrors.name" id="create-name-error"
                  class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.name"></p>
              </div>
              <div>
                <label for="create-circuit-id"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Circuit ID <span
                    aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                <input id="create-circuit-id" type="text" x-model="formData.circuit_id" required aria-required="true"
                  :aria-invalid="!!validationErrors.circuit_id"
                  class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                  :class="validationErrors.circuit_id ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
                <p x-show="validationErrors.circuit_id" class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert"
                  x-text="validationErrors.circuit_id"></p>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label for="create-provider"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Provider <span
                    aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                <input id="create-provider" type="text" x-model="formData.provider" required aria-required="true"
                  :aria-invalid="!!validationErrors.provider"
                  class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                  :class="validationErrors.provider ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
                <p x-show="validationErrors.provider" class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert"
                  x-text="validationErrors.provider"></p>
              </div>
              <div>
                <label for="create-type"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Type</label>
                <select id="create-type" x-model="formData.type"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                  <option value="fiber">Fiber</option>
                  <option value="copper">Copper</option>
                  <option value="microwave">Microwave</option>
                  <option value="dark_fiber">Dark Fiber</option>
                </select>
              </div>
            </div>
            <div class="grid grid-cols-3 gap-4">
              <div>
                <label for="create-status"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Status</label>
                <select id="create-status" x-model="formData.status"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                  <option value="active">Active</option>
                  <option value="maintenance">Maintenance</option>
                  <option value="down">Down</option>
                  <option value="decommissioned">Decommissioned</option>
                </select>
              </div>
              <div>
                <label for="create-capacity"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Capacity (Mbps)</label>
                <input id="create-capacity" type="number" x-model.number="formData.capacity_mbps" min="0"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
              </div>
              <div>
                <label for="create-vlan" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">VLAN
                  ID</label>
                <input id="create-vlan" type="number" x-model.number="formData.vlan_id" min="0"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
              </div>
            </div>

            <!-- Endpoints -->
            <div class="border-t border-gray-200 dark:border-gray-700 pt-4">
              <h3 class="text-sm font-medium text-gray-800 dark:text-gray-200 mb-3">Endpoints</h3>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label for="create-dc-a"
                    class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Datacenter A</label>
                  <select id="create-dc-a" x-model="formData.datacenter_a_id"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                    <option value="">Select Datacenter</option>
                    <template x-for="dc in datacenters" :key="dc.id">
                      <option :value="dc.id" x-text="dc.name"></option>
                    </template>
                  </select>
                </div>
                <div>
                  <label for="create-dc-b"
                    class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Datacenter B</label>
                  <select id="create-dc-b" x-model="formData.datacenter_b_id"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                    <option value="">Select Datacenter</option>
                    <template x-for="dc in datacenters" :key="dc.id">
                      <option :value="dc.id" x-text="dc.name"></option>
                    </template>
                  </select>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4 mt-3">
                <div>
                  <label for="create-port-a"
                    class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Port A</label>
                  <input id="create-port-a" type="text" x-model="formData.port_a"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                </div>
                <div>
                  <label for="create-port-b"
                    class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Port B</label>
                  <input id="create-port-b" type="text" x-model="formData.port_b"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4 mt-3">
                <div>
                  <label for="create-ip-a" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">IP
                    Address A</label>
                  <input id="create-ip-a" type="text" x-model="formData.ip_address_a" placeholder="e.g., 192.168.1.1/30"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                </div>
                <div>
                  <label for="create-ip-b" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">IP
                    Address B</label>
                  <input id="create-ip-b" type="text" x-model="formData.ip_address_b" placeholder="e.g., 192.168.1.2/30"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                </div>
              </div>
            </div>

            <!-- Description -->
            <div>
              <label for="create-description"
                class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
              <input id="create-description" type="text" x-model="formData.description"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            </div>
          </div>
          <div class="flex justify-end gap-3 mt-6">
            <button type="button" @click="closeModal()"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
            <button type="submit" :disabled="saving"
              class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
              <span x-show="!saving">Create Circuit</span>
              <span x-show="saving">Creating...</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Edit Circuit Modal -->
    <template x-if="showEditModal && selectedCircuit">
      <div :class="$store.ui.modalViewport()" role="dialog" aria-modal="true"
        aria-labelledby="edit-modal-title" @keydown.escape.window="closeModal()">
        <div :class="$store.ui.modalBackdrop()" @click="closeModal()" aria-hidden="true"></div>
        <div :class="$store.ui.modalPanel('2xl', true)"
          x-trap.inert.noscroll="true">
          <button @click="closeModal()" :class="$store.ui.modalCloseButton()"
            aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="edit-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Edit Circuit</h2>
          <form @submit.prevent="saveCircuit()">
            <div class="space-y-4">
              <!-- Basic Info -->
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label :for="'edit-name-' + getSelectedCircuitId()"
                    class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Name <span
                      aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                  <input :id="'edit-name-' + getSelectedCircuitId()" type="text" x-model="formData.name" required
                    aria-required="true" :aria-invalid="!!validationErrors.name"
                    class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                    :class="validationErrors.name ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
                  <p x-show="validationErrors.name" class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert"
                    x-text="validationErrors.name"></p>
                </div>
                <div>
                  <label :for="'edit-circuit-id-' + getSelectedCircuitId()"
                    class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Circuit ID <span
                      aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                  <input :id="'edit-circuit-id-' + getSelectedCircuitId()" type="text" x-model="formData.circuit_id"
                    required aria-required="true" :aria-invalid="!!validationErrors.circuit_id"
                    class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                    :class="validationErrors.circuit_id ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
                  <p x-show="validationErrors.circuit_id" class="mt-1 text-sm text-red-700 dark:text-red-300"
                    role="alert" x-text="validationErrors.circuit_id"></p>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label :for="'edit-provider-' + getSelectedCircuitId()"
                    class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Provider <span
                      aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
