<div x-data="networkDetail">
  <div x-show="loading" class="text-gray-600 dark:text-gray-400" role="status" aria-live="polite">Loading...</div>
  <div x-show="error" class="p-4 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 rounded-md" x-text="error" role="alert"></div>
  <div x-show="!loading && network">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center">
        <button @click="$dispatch('nav', '/networks')" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white mr-2 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 rounded p-1 transition-colors" aria-label="Back to networks list">&larr;</button>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white" x-text="network?.name"></h1>
      </div>
      <div class="flex gap-2">
        <button @click="openEditModal()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 transition-colors">Edit</button>
        <button @click="confirmDelete()" class="px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700 cursor-pointer focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 transition-colors">Delete</button>
      </div>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6">
      <dl class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><dt class="text-sm text-gray-600 dark:text-gray-400">Subnet</dt><dd class="font-medium text-gray-900 dark:text-white" x-text="network?.subnet"></dd></div>
        <div><dt class="text-sm text-gray-600 dark:text-gray-400">VLAN ID</dt><dd class="font-medium text-gray-900 dark:text-white" x-text="network?.vlan_id || '-'"></dd></div>
        <div><dt class="text-sm text-gray-600 dark:text-gray-400">Datacenter</dt><dd class="font-medium text-gray-900 dark:text-white" x-text="getDatacenterName(network?.datacenter_id)"></dd></div>
        <div><dt class="text-sm text-gray-600 dark:text-gray-400">Description</dt><dd class="font-medium text-gray-900 dark:text-white" x-text="network?.description || '-'"></dd></div>
      </dl>
      <div x-show="utilization" class="mt-6">
        <h3 class="text-sm text-gray-600 dark:text-gray-400 mb-2">Utilization</h3>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-4" role="progressbar" :aria-valuenow="utilizationPercent()" aria-valuemin="0" aria-valuemax="100" :aria-label="'Network utilization: ' + utilizationPercent() + ' percent'">
          <div class="bg-blue-600 h-4 rounded-full" :style="'width: ' + utilizationPercent() + '%'"></div>
        </div>
        <p class="text-sm text-gray-600 dark:text-gray-400 mt-1"><span x-text="utilizationPercent()"></span>% used</p>
      </div>
    </div>

    <!-- Pools Section -->
    <div class="mt-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white">IP Pools</h2>
        <button @click="openAddPoolModal()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 transition-colors">Add Pool</button>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
          <thead class="bg-gray-50 dark:bg-gray-700">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-600 dark:text-gray-400 uppercase tracking-wider">Name</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-600 dark:text-gray-400 uppercase tracking-wider">Range</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-600 dark:text-gray-400 uppercase tracking-wider">Tags</th>
              <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
            <tr x-show="pools.length === 0"><td colspan="4" class="px-6 py-8 text-center text-gray-600 dark:text-gray-400">No pools defined</td></tr>
            <template x-for="pool in pools" :key="pool.id">
              <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                <td class="px-6 py-4">
                  <a :href="'/pools/detail?id=' + pool.id" @click.prevent="$dispatch('nav', '/pools/detail?id=' + pool.id)" class="text-blue-700 dark:text-blue-300 hover:text-blue-900 dark:hover:text-blue-100 hover:underline font-medium cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors" x-text="pool.name"></a>
                </td>
                <td class="px-6 py-4 text-gray-600 dark:text-gray-400" x-text="pool.start_ip + ' - ' + pool.end_ip"></td>
                <td class="px-6 py-4">
                  <div class="flex flex-wrap gap-1">
                    <template x-for="tag in (pool.tags || [])" :key="tag">
                      <span class="px-2 py-0.5 text-xs bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-gray-200 rounded" x-text="tag"></span>
                    </template>
                  </div>
                </td>
                <td class="px-6 py-4 text-right">
                  <button @click="openEditPoolModal(pool)" class="text-sm text-blue-700 dark:text-blue-300 hover:text-blue-900 dark:hover:text-blue-100 hover:underline mr-3 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors" :aria-label="'Edit pool ' + pool.name">Edit</button>
                  <button @click="confirmDeletePool(pool)" class="text-sm text-red-700 dark:text-red-300 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors" :aria-label="'Delete pool ' + pool.name">Delete</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <!-- Delete Network Modal -->
  <include src="partials/modals/delete-confirm.html"></include>

  <!-- Edit Network Modal -->
  <div x-show="showEditModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="edit-network-modal-title" @keydown.escape.window="closeEditModal()">
    <div class="fixed inset-0 bg-black/50" @click="closeEditModal()" aria-hidden="true"></div>
    <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6">
      <button @click="closeEditModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-full p-1 cursor-pointer transition-colors" aria-label="Close dialog">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <h3 id="edit-network-modal-title" class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Edit Network</h3>
      <form @submit.prevent="saveNetwork()">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Name *</label>
            <input type="text" x-model="editNetwork.name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Subnet *</label>
            <input type="text" x-model="editNetwork.subnet" required placeholder="e.g., 192.168.1.0/24" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">VLAN ID</label>
            <input type="number" x-model.number="editNetwork.vlan_id" min="0" max="4094" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div x-show="hasMultipleDatacenters">
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Datacenter</label>
            <select x-model="editNetwork.datacenter_id" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Select datacenter...</option>
              <template x-for="dc in datacenters" :key="dc.id">
                <option :value="dc.id" x-text="dc.name"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Description</label>
            <textarea x-model="editNetwork.description" rows="3" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button type="button" @click="closeEditModal()" class="px-4 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">Cancel</button>
          <button type="submit" :disabled="saving" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">
            <span x-show="!saving">Save Changes</span>
            <span x-show="saving">Saving...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add/Edit Pool Modal -->
  <include src="partials/modals/pool-form.html"></include>

  <!-- Delete Pool Modal -->
  <div x-show="showDeletePoolModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-black/50" @click="cancelDeletePool()"></div>
    <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full p-6">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Delete Pool</h3>
      <p class="text-gray-600 dark:text-gray-400 mb-6">Are you sure you want to delete <strong x-text="deletePoolTarget?.name"></strong>?</p>
      <div class="flex justify-end gap-3">
        <button @click="cancelDeletePool()" class="px-4 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">Cancel</button>
        <button @click="doDeletePool()" :disabled="deletingPool" class="px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700 disabled:opacity-50">Delete</button>
      </div>
    </div>
  </div>
</div>
