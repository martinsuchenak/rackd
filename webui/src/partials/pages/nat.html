<!-- NAT Mappings Page -->
<template x-if="route.startsWith('/nat')">
  <div x-data="natComponent" x-init="init()" class="space-y-6">
    <!-- Page Header -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">NAT Mappings</h1>
      <div class="flex gap-2">
        <button x-show="$store.permissions.canCreate('nat')" @click="openCreateForm()"
          class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]">
          Add Mapping
        </button>
      </div>
    </div>
    <div x-show="error"
      class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800"
      role="alert" x-text="error"></div>
    <!-- Filters -->
    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex flex-wrap gap-3">
        <div>
          <label for="nat-search" class="sr-only">Search NAT mappings</label>
          <input id="nat-search" type="text" x-model="search" @input="applySearch()" placeholder="Search..."
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <div>
          <label for="nat-filter-external-ip" class="sr-only">Filter by external IP</label>
          <input id="nat-filter-external-ip" type="text" x-model="filterExternalIP" @change="applyFilters()"
            placeholder="External IP"
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <div>
          <label for="nat-filter-internal-ip" class="sr-only">Filter by internal IP</label>
          <input id="nat-filter-internal-ip" type="text" x-model="filterInternalIP" @change="applyFilters()"
            placeholder="Internal IP"
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <div>
          <label for="nat-filter-protocol" class="sr-only">Filter by protocol</label>
          <select id="nat-filter-protocol" x-model="filterProtocol" @change="applyFilters()"
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            <option value="">All Protocols</option>
            <option value="tcp">TCP</option>
            <option value="udp">UDP</option>
            <option value="any">Any</option>
          </select>
        </div>
        <div>
          <label for="nat-filter-status" class="sr-only">Filter by status</label>
          <select id="nat-filter-status" x-model="filterEnabled" @change="applyFilters()"
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            <option value="">All Statuses</option>
            <option value="true">Enabled</option>
            <option value="false">Disabled</option>
          </select>
        </div>
        <button @click="clearFilters()"
          class="px-3 py-2 text-sm text-gray-800 dark:text-gray-200 hover:text-gray-900 dark:hover:text-white focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded cursor-pointer transition-colors min-h-[44px]">
          Clear filters
        </button>
      </div>
      <!-- Table -->
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of NAT mappings with name, external/internal addresses and protocol, and status
        </caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Name</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              External</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Internal</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Protocol</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Device</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Status</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="loading">
            <td colspan="8" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200"><span role="status"
                aria-live="polite">Loading NAT mappings...</span></td>
          </tr>
          <tr x-show="!loading && mappings.length === 0">
            <td colspan="8" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">No NAT mappings found</td>
          </tr>
          <template x-for="mapping in mappings" :key="mapping.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <a :href="getMappingDetailLink(mapping)"
                  @click.prevent="$dispatch('nav', getMappingDetailLink(mapping))"
                  class="text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline font-medium cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors"
                  x-text="mapping.name"></a>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200 font-mono"
                x-text="formatAddress(mapping.external_ip, mapping.external_port)"></td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200 font-mono"
                x-text="formatAddress(mapping.internal_ip, mapping.internal_port)"></td>
              <td class="px-6 py-4">
                <span class="inline-flex px-2 py-1 text-xs font-medium rounded" :class="getProtocolClass(mapping)"
                  x-text="formatProtocol(mapping.protocol)"></span>
              </td>
              <td class="px-6 py-4">
                <template x-if="mapping.device_id">
                  <a :href="getDeviceDetailLink(mapping.device_id)"
                    @click.prevent="$dispatch('nav', getDeviceDetailLink(mapping.device_id))"
                    class="text-blue-800 dark:text-blue-200 hover:underline cursor-pointer"
                    x-text="getDeviceName(mapping.device_id)"></a>
                </template>
                <span x-show="!mapping.device_id" class="text-gray-500 dark:text-gray-400">-</span>
              </td>
              <td class="px-6 py-4">
                <span class="inline-flex px-2 py-1 text-xs font-medium rounded" :class="getStatusClass(mapping)"
                  x-text="getStatusLabel(mapping)"></span>
              </td>
              <td class="px-6 py-4 text-right text-sm font-medium">
                <button x-show="$store.permissions.canUpdate('nat')" @click="openEditForm(mapping)"
                  class="text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 cursor-pointer mr-3">Edit</button>
                <button x-show="$store.permissions.canDelete('nat')" @click="confirmDelete(mapping.id)"
                  class="text-red-800 dark:text-red-400 dark:hover:text-red-300 cursor-pointer">Delete</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Delete Confirmation Modal -->
    <template x-if="showDeleteConfirm">
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4" role="alertdialog" aria-modal="true"
        aria-labelledby="delete-confirm-title" aria-describedby="delete-confirm-desc"
        @keydown.escape.window="showDeleteConfirm = false">
        <div class="fixed inset-0 bg-black/50" @click="showDeleteConfirm = false" aria-hidden="true"></div>
        <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full p-6"
          x-trap.inert.noscroll="true">
          <button @click="showDeleteConfirm = false"
            class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="delete-confirm-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Delete NAT
            Mapping
          </h2>
          <p id="delete-confirm-desc" class="text-gray-800 dark:text-gray-200 mb-6">
            Are you sure you want to delete <strong x-text="getDeleteTargetName()"></strong>? This
            action cannot be undone.
          </p>
          <div class="flex justify-end gap-3">
            <button @click="showDeleteConfirm = false"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
            <button @click="doDelete()" :disabled="saving"
              class="px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
              <span x-show="!saving">Delete</span>
              <span x-show="saving">Deleting...</span>
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>
</template>
