<!-- NAT Mappings Page -->
<template x-if="route.startsWith('/nat')">
  <div x-data="natComponent" x-init="init()" class="space-y-6">
    <!-- Page Header -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">NAT Mappings</h1>
      <div class="flex gap-2">
        <button x-show="$store.permissions.canCreate('nat')" @click="openCreateForm()"
          class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]">
          Add Mapping
        </button>
      </div>
    </div>
    <div x-show="error"
      class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800"
      role="alert" x-text="error"></div>
    <!-- Filters -->
    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex flex-wrap gap-3">
        <div>
          <label for="nat-search" class="sr-only">Search NAT mappings</label>
          <input id="nat-search" type="text" x-model="search" @input="applySearch()" placeholder="Search..."
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <div>
          <label for="nat-filter-external-ip" class="sr-only">Filter by external IP</label>
          <input id="nat-filter-external-ip" type="text" x-model="filterExternalIP" @change="applyFilters()"
            placeholder="External IP"
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <div>
          <label for="nat-filter-internal-ip" class="sr-only">Filter by internal IP</label>
          <input id="nat-filter-internal-ip" type="text" x-model="filterInternalIP" @change="applyFilters()"
            placeholder="Internal IP"
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <div>
          <label for="nat-filter-protocol" class="sr-only">Filter by protocol</label>
          <select id="nat-filter-protocol" x-model="filterProtocol" @change="applyFilters()"
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            <option value="">All Protocols</option>
            <option value="tcp">TCP</option>
            <option value="udp">UDP</option>
            <option value="any">Any</option>
          </select>
        </div>
        <div>
          <label for="nat-filter-status" class="sr-only">Filter by status</label>
          <select id="nat-filter-status" x-model="filterEnabled" @change="applyFilters()"
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            <option value="">All Statuses</option>
            <option value="true">Enabled</option>
            <option value="false">Disabled</option>
          </select>
        </div>
        <button @click="clearFilters()"
          class="px-3 py-2 text-sm text-gray-800 dark:text-gray-200 hover:text-gray-900 dark:hover:text-white focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded cursor-pointer transition-colors min-h-[44px]">
          Clear filters
        </button>
      </div>
      <!-- Table -->
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of NAT mappings with name, external/internal addresses and protocol, and status
        </caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Name</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              External</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Internal</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Protocol</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Device</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Status</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="loading">
            <td colspan="8" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200"><span role="status"
                aria-live="polite">Loading NAT mappings...</span></td>
          </tr>
          <tr x-show="!loading && mappings.length === 0">
            <td colspan="8" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">No NAT mappings found</td>
          </tr>
          <template x-for="mapping in mappings" :key="mapping.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <button @click="openEditForm(mapping)"
                  class="text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline font-medium cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors"
                  x-text="mapping.name"></button>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200 font-mono"
                x-text="formatAddress(mapping.external_ip, mapping.external_port)"></td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200 font-mono"
                x-text="formatAddress(mapping.internal_ip, mapping.internal_port)"></td>
              <td class="px-6 py-4">
                <span class="inline-flex px-2 py-1 text-xs font-medium rounded" :class="getProtocolClass(mapping)"
                  x-text="formatProtocol(mapping.protocol)"></span>
              </td>
              <td class="px-6 py-4">
                <template x-if="mapping.device_id">
                  <a :href="getDeviceDetailLink(mapping.device_id)"
                    @click.prevent="$dispatch('nav', getDeviceDetailLink(mapping.device_id))"
                    class="text-blue-800 dark:text-blue-200 hover:underline cursor-pointer"
                    x-text="getDeviceName(mapping.device_id)"></a>
                </template>
                <span x-show="!mapping.device_id" class="text-gray-500 dark:text-gray-400">-</span>
              </td>
              <td class="px-6 py-4">
                <span class="inline-flex px-2 py-1 text-xs font-medium rounded" :class="getStatusClass(mapping)"
                  x-text="getStatusLabel(mapping)"></span>
              </td>
              <td class="px-6 py-4 text-right">
                <div class="inline-flex gap-1">
                  <button x-show="$store.permissions.canUpdate('nat')" @click="openEditForm(mapping)"
                    class="px-3 py-1 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors">Edit</button>
                  <button x-show="$store.permissions.canDelete('nat')" @click="confirmDelete(mapping.id)"
                    class="px-3 py-1 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors">Delete</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Create/Edit Form Modal -->
    <template x-if="showForm">
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true"
        :aria-labelledby="editingId ? 'nat-edit-title' : 'nat-create-title'"
        @keydown.escape.window="closeForm()">
        <div class="fixed inset-0 bg-black/50" @click="closeForm()" aria-hidden="true"></div>
        <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto"
          x-trap.inert.noscroll="true">
          <button @click="closeForm()"
            class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 :id="editingId ? 'nat-edit-title' : 'nat-create-title'"
            class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-6"
            x-text="editingId ? 'Edit NAT Mapping' : 'Add NAT Mapping'"></h2>

          <form @submit.prevent="saveForm()" class="space-y-4">
            <!-- Name -->
            <div>
              <label for="nat-form-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name <span aria-hidden="true">*</span></label>
              <input id="nat-form-name" type="text" x-model="form.name" required
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
              <p x-show="formErrors.name" x-text="formErrors.name" class="mt-1 text-sm text-red-600 dark:text-red-400"></p>
            </div>

            <!-- External / Internal addresses -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label for="nat-form-ext-ip" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">External IP <span aria-hidden="true">*</span></label>
                <input id="nat-form-ext-ip" type="text" x-model="form.external_ip" placeholder="e.g. 203.0.113.1"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                <p x-show="formErrors.external_ip" x-text="formErrors.external_ip" class="mt-1 text-sm text-red-600 dark:text-red-400"></p>
              </div>
              <div>
                <label for="nat-form-ext-port" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">External Port <span aria-hidden="true">*</span></label>
                <input id="nat-form-ext-port" type="number" x-model="form.external_port" min="0" max="65535" placeholder="e.g. 80"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                <p x-show="formErrors.external_port" x-text="formErrors.external_port" class="mt-1 text-sm text-red-600 dark:text-red-400"></p>
              </div>
              <div>
                <label for="nat-form-int-ip" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Internal IP <span aria-hidden="true">*</span></label>
                <input id="nat-form-int-ip" type="text" x-model="form.internal_ip" placeholder="e.g. 192.168.1.10"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                <p x-show="formErrors.internal_ip" x-text="formErrors.internal_ip" class="mt-1 text-sm text-red-600 dark:text-red-400"></p>
              </div>
              <div>
                <label for="nat-form-int-port" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Internal Port <span aria-hidden="true">*</span></label>
                <input id="nat-form-int-port" type="number" x-model="form.internal_port" min="0" max="65535" placeholder="e.g. 8080"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                <p x-show="formErrors.internal_port" x-text="formErrors.internal_port" class="mt-1 text-sm text-red-600 dark:text-red-400"></p>
              </div>
            </div>

            <!-- Protocol & Status -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label for="nat-form-protocol" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Protocol</label>
                <select id="nat-form-protocol" x-model="form.protocol"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                  <option value="tcp">TCP</option>
                  <option value="udp">UDP</option>
                  <option value="any">Any</option>
                </select>
              </div>
              <div class="flex items-center gap-3 pt-6">
                <input id="nat-form-enabled" type="checkbox" x-model="form.enabled"
                  class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <label for="nat-form-enabled" class="text-sm font-medium text-gray-700 dark:text-gray-300">Enabled</label>
              </div>
            </div>

            <!-- Optional fields -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label for="nat-form-device" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Device</label>
                <select id="nat-form-device" x-model="form.device_id"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                  <option value="">None</option>
                  <template x-for="device in devices" :key="device.id">
                    <option :value="device.id" x-text="device.name"></option>
                  </template>
                </select>
              </div>
              <div>
                <label for="nat-form-network" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Network</label>
                <select id="nat-form-network" x-model="form.network_id"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                  <option value="">None</option>
                  <template x-for="network in networks" :key="network.id">
                    <option :value="network.id" x-text="network.name"></option>
                  </template>
                </select>
              </div>
            </div>

            <div>
              <label for="nat-form-description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
              <input id="nat-form-description" type="text" x-model="form.description"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            </div>

            <div>
              <label for="nat-form-tags" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tags <span class="text-gray-500 font-normal">(comma-separated)</span></label>
              <input id="nat-form-tags" type="text" x-model="form.tags" placeholder="e.g. web, prod"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            </div>

            <div x-show="error" x-text="error" class="text-sm text-red-600 dark:text-red-400"></div>

            <div class="flex justify-end gap-3 pt-2">
              <button type="button" @click="closeForm()"
                class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
              <button type="submit" :disabled="saving"
                class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
                <span x-show="!saving" x-text="editingId ? 'Update' : 'Create'"></span>
                <span x-show="saving">Saving...</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </template>

    <!-- Delete Confirmation Modal -->
    <template x-if="showDeleteConfirm">
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4" role="alertdialog" aria-modal="true"
        aria-labelledby="delete-confirm-title" aria-describedby="delete-confirm-desc"
        @keydown.escape.window="cancelDelete()">
        <div class="fixed inset-0 bg-black/50" @click="cancelDelete()" aria-hidden="true"></div>
        <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full p-6"
          x-trap.inert.noscroll="true">
          <button @click="cancelDelete()"
            class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="delete-confirm-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Delete NAT
            Mapping
          </h2>
          <p id="delete-confirm-desc" class="text-gray-800 dark:text-gray-200 mb-6">
            Are you sure you want to delete <strong x-text="getDeleteTargetName()"></strong>? This
            action cannot be undone.
          </p>
          <div class="flex justify-end gap-3">
            <button @click="cancelDelete()"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
            <button @click="doDelete()" :disabled="saving"
              class="px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
              <span x-show="!saving">Delete</span>
              <span x-show="saving">Deleting...</span>
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>
</template>
