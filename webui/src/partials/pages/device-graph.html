<div x-data="deviceGraph()" x-init="init()">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">Network Topology</h1>
    <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">Visual representation of device relationships</p>
  </div>

  <div x-show="loading" class="text-gray-700 dark:text-gray-300" role="status" aria-live="polite">Loading graph...</div>
  <div x-show="error" class="p-4 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 rounded-md mb-4"
    x-text="error" role="alert"></div>

  <div x-show="!loading && !error"
    class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700">
    <!-- Toolbar -->
    <div class="p-4 border-b border-gray-200 dark:border-gray-700">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <!-- Left: Filter toggle and Layout -->
        <div class="flex items-center gap-4">
          <button @click="showFilters = !showFilters"
            class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
            </svg>
            Filters
            <span x-show="hasActiveFilters()"
              class="ml-1 px-1.5 py-0.5 text-xs bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded-full">
              Active
            </span>
          </button>

          <div class="flex items-center gap-2">
            <label class="text-sm text-gray-600 dark:text-gray-400">Layout:</label>
            <select x-model="selectedLayout" @change="applyLayout()"
              class="px-3 py-2 text-sm bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 dark:text-gray-100">
              <template x-for="layout in layouts" :key="layout.value">
                <option :value="layout.value" x-text="layout.label"></option>
              </template>
            </select>
          </div>
        </div>

        <!-- Center: Zoom controls -->
        <div class="flex items-center gap-2">
          <button @click="zoomOut()"
            class="p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            title="Zoom Out">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7" />
            </svg>
          </button>
          <button @click="fitGraph()"
            class="p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            title="Fit to Screen">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
            </svg>
          </button>
          <button @click="zoomIn()"
            class="p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            title="Zoom In">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7" />
            </svg>
          </button>
        </div>

        <!-- Right: Export buttons -->
        <div class="flex items-center gap-2">
          <span class="text-sm text-gray-600 dark:text-gray-400">Export:</span>
          <button @click="exportPNG()"
            class="px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            PNG
          </button>
          <button @click="exportJSON()"
            class="px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            JSON
          </button>
        </div>
      </div>

      <!-- Filter Panel -->
      <div x-show="showFilters" x-collapse class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <!-- Search -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Search</label>
            <input type="text" x-model="filters.search" @input.debounce.300ms="renderGraph()"
              placeholder="Device name or hostname"
              class="w-full px-3 py-2 text-sm bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 dark:text-gray-100">
          </div>

          <!-- Datacenter -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Datacenter</label>
            <select x-model="filters.datacenterId" @change="renderGraph()"
              class="w-full px-3 py-2 text-sm bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 dark:text-gray-100">
              <option value="">All Datacenters</option>
              <template x-for="dc in datacenters" :key="dc.id">
                <option :value="dc.id" x-text="dc.name"></option>
              </template>
            </select>
          </div>

          <!-- Device Status -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Device Status</label>
            <div class="flex flex-wrap gap-2">
              <label class="flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" value="active" x-model="filters.status" @change="renderGraph()"
                  class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700 dark:text-gray-300">Active</span>
              </label>
              <label class="flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" value="planned" x-model="filters.status" @change="renderGraph()"
                  class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700 dark:text-gray-300">Planned</span>
              </label>
              <label class="flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" value="maintenance" x-model="filters.status" @change="renderGraph()"
                  class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700 dark:text-gray-300">Maintenance</span>
              </label>
            </div>
          </div>

          <!-- Relationship Types -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Relationship Type</label>
            <div class="flex flex-wrap gap-2">
              <label class="flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" value="contains" x-model="filters.relationshipTypes" @change="renderGraph()"
                  class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700 dark:text-gray-300">Contains</span>
              </label>
              <label class="flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" value="connected_to" x-model="filters.relationshipTypes" @change="renderGraph()"
                  class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700 dark:text-gray-300">Connected</span>
              </label>
              <label class="flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" value="depends_on" x-model="filters.relationshipTypes" @change="renderGraph()"
                  class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700 dark:text-gray-300">Depends</span>
              </label>
            </div>
          </div>
        </div>

        <div class="mt-3 flex justify-end">
          <button @click="resetFilters()" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">Reset
            Filters</button>
        </div>
      </div>
    </div>

    <!-- Legend -->
    <div
      class="px-4 py-2 bg-gray-50 dark:bg-gray-900/50 border-b border-gray-200 dark:border-gray-700 flex items-center gap-6 text-sm">
      <span class="text-gray-700 dark:text-gray-300 font-medium">Legend:</span>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-1">
          <div class="w-3 h-3 rounded-full bg-green-500"></div>
          <span class="text-gray-600 dark:text-gray-400">Active</span>
        </div>
        <div class="flex items-center gap-1">
          <div class="w-3 h-3 rounded-full bg-blue-500"></div>
          <span class="text-gray-600 dark:text-gray-400">Planned</span>
        </div>
        <div class="flex items-center gap-1">
          <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
          <span class="text-gray-600 dark:text-gray-400">Maintenance</span>
        </div>
        <div class="flex items-center gap-1">
          <div class="w-3 h-3 rounded-full bg-gray-500"></div>
          <span class="text-gray-600 dark:text-gray-400">Decommissioned</span>
        </div>
      </div>
      <div class="border-l border-gray-300 dark:border-gray-600 pl-4 flex items-center gap-4">
        <div class="flex items-center gap-1">
          <div class="w-4 h-0.5 bg-green-500"></div>
          <span class="text-gray-600 dark:text-gray-400">Contains</span>
        </div>
        <div class="flex items-center gap-1">
          <div class="w-4 h-0.5 bg-blue-500"></div>
          <span class="text-gray-600 dark:text-gray-400">Connected To</span>
        </div>
        <div class="flex items-center gap-1">
          <div class="w-4 h-0.5 bg-purple-500"></div>
          <span class="text-gray-600 dark:text-gray-400">Depends On</span>
        </div>
      </div>
    </div>

    <!-- Graph Container -->
    <div class="relative">
      <div id="graph-container" class="w-full bg-gray-50 dark:bg-gray-900 rounded-b-lg" style="height: 600px;"></div>

      <!-- Node Tooltip -->
      <div x-show="hoveredNode" x-transition
        class="absolute top-4 right-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg p-3 max-w-xs z-10">
        <template x-if="hoveredNode">
          <div>
            <div class="font-semibold text-gray-900 dark:text-gray-100" x-text="hoveredNode.name"></div>
            <div class="text-sm text-gray-500 dark:text-gray-400" x-text="hoveredNode.hostname || 'No hostname'"></div>
            <div class="mt-2 space-y-1 text-sm">
              <div class="flex items-center gap-2">
                <span class="text-gray-500 dark:text-gray-400">Status:</span>
                <span class="capitalize" :class="getHoveredNodeStatusClass()" x-text="hoveredNode.status"></span>
              </div>
              <div x-show="hoveredNode.addresses && hoveredNode.addresses.length"
                class="text-gray-500 dark:text-gray-400">
                <span x-text="getHoveredNodeAddressLabel()"></span>
              </div>
            </div>
            <div class="mt-2 text-xs text-gray-400 dark:text-gray-500">Click to view details</div>
          </div>
        </template>
      </div>
    </div>

    <!-- Stats -->
    <div
      class="px-4 py-3 bg-gray-50 dark:bg-gray-900/50 border-t border-gray-200 dark:border-gray-700 text-sm text-gray-500 dark:text-gray-400">
      <span x-text="getFilteredDevicesCount()"></span> devices · <span x-text="getFilteredRelationshipsCount()"></span>
      relationships
      <span x-show="hasTotalDevicesMismatch()" class="text-blue-600 dark:text-blue-400 ml-2">
        (filtered from <span x-text="getTotalDevicesCount()"></span> total)
      </span>
    </div>
  </div>
</div>
