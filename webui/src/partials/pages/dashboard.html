<!-- Dashboard -->
<template x-if="route === '/'">
  <div x-data="{
    stats: { devices: '-', networks: '-', datacenters: '-', discovered: '-' },
    statusCounts: { planned: 0, active: 0, maintenance: 0, decommissioned: 0 },
    async init() {
      const [d, n, dc, disc, statusC] = await Promise.all([
        window.rackdAPI?.listDevices().catch(() => []),
        window.rackdAPI?.listNetworks().catch(() => []),
        window.rackdAPI?.listDatacenters().catch(() => []),
        window.rackdAPI?.listDiscoveredDevices().catch(() => []),
        window.rackdAPI?.getDeviceStatusCounts().catch(() => ({ planned: 0, active: 0, maintenance: 0, decommissioned: 0 }))
      ]);
      this.stats = { devices: (d || []).length, networks: (n || []).length, datacenters: (dc || []).length, discovered: (disc || []).length };
      this.statusCounts = statusC || { planned: 0, active: 0, maintenance: 0, decommissioned: 0 };
    }
  }">
    <h1 class="text-2xl font-bold mb-6 text-gray-900 dark:text-gray-50">Dashboard</h1>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" role="list" aria-label="Statistics overview">
      <a href="/devices" @click.prevent="$dispatch('nav', '/devices')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6 hover:shadow-md hover:border-gray-400 dark:hover:border-gray-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]" role="listitem" aria-label="View all devices">
        <div class="text-sm font-medium text-gray-600 dark:text-gray-400">Devices</div>
        <div class="text-3xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.devices" aria-live="polite"></div>
      </a>
      <a href="/networks" @click.prevent="$dispatch('nav', '/networks')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6 hover:shadow-md hover:border-gray-400 dark:hover:border-gray-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]" role="listitem" aria-label="View all networks">
        <div class="text-sm font-medium text-gray-600 dark:text-gray-400">Networks</div>
        <div class="text-3xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.networks" aria-live="polite"></div>
      </a>
      <a href="/datacenters" @click.prevent="$dispatch('nav', '/datacenters')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6 hover:shadow-md hover:border-gray-400 dark:hover:border-gray-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]" role="listitem" aria-label="View all datacenters">
        <div class="text-sm font-medium text-gray-600 dark:text-gray-400">Datacenters</div>
        <div class="text-3xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.datacenters" aria-live="polite"></div>
      </a>
      <a href="/discovery" @click.prevent="$dispatch('nav', '/discovery')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6 hover:shadow-md hover:border-gray-400 dark:hover:border-gray-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]" role="listitem" aria-label="View discovered devices">
        <div class="text-sm font-medium text-gray-600 dark:text-gray-400">Discovered</div>
        <div class="text-3xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.discovered" aria-live="polite"></div>
      </a>
    </div>

    <!-- Device Status Summary -->
    <div class="mt-8">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Device Status</h2>
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <a href="/devices?status=planned" @click.prevent="$dispatch('nav', '/devices?status=planned')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-4 hover:shadow-md hover:border-blue-400 dark:hover:border-blue-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-blue-500"></div>
            <span class="text-sm text-gray-600 dark:text-gray-400">Planned</span>
          </div>
          <div class="text-2xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="statusCounts.planned"></div>
        </a>
        <a href="/devices?status=active" @click.prevent="$dispatch('nav', '/devices?status=active')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-4 hover:shadow-md hover:border-green-400 dark:hover:border-green-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-green-500">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-green-500"></div>
            <span class="text-sm text-gray-600 dark:text-gray-400">Active</span>
          </div>
          <div class="text-2xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="statusCounts.active"></div>
        </a>
        <a href="/devices?status=maintenance" @click.prevent="$dispatch('nav', '/devices?status=maintenance')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-4 hover:shadow-md hover:border-yellow-400 dark:hover:border-yellow-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-yellow-500">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
            <span class="text-sm text-gray-600 dark:text-gray-400">Maintenance</span>
          </div>
          <div class="text-2xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="statusCounts.maintenance"></div>
        </a>
        <a href="/devices?status=decommissioned" @click.prevent="$dispatch('nav', '/devices?status=decommissioned')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-4 hover:shadow-md hover:border-gray-400 dark:hover:border-gray-500 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-gray-500">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-gray-400"></div>
            <span class="text-sm text-gray-600 dark:text-gray-400">Decommissioned</span>
          </div>
          <div class="text-2xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="statusCounts.decommissioned"></div>
        </a>
      </div>
    </div>
  </div>
</template>
