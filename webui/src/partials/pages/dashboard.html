<!-- Dashboard -->
<template x-if="route === '/'">
  <div x-data="dashboardComponent()" x-init="init()" @vue:mounted="init()" x-destroy="destroy()">
    <h1 class="text-2xl font-bold mb-6 text-gray-900 dark:text-gray-50">Dashboard</h1>

    <!-- Loading State -->
    <template x-if="loading">
      <div class="flex justify-center py-8">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      </div>
    </template>

    <!-- Error State -->
    <template x-if="error">
      <div class="bg-red-100 dark:bg-red-900/30 border border-red-300 dark:border-red-800 text-red-800 dark:text-red-200 rounded-lg p-4 mb-6" role="alert" x-text="error"></div>
    </template>

    <!-- Stats Content -->
    <template x-if="stats">
      <div>
        <!-- Top Level Stats Row -->
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8" role="list" aria-label="Statistics overview">
          <a href="/devices" @click.prevent="$dispatch('nav', '/devices')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6 hover:shadow-md hover:border-gray-400 dark:hover:border-gray-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900" role="listitem">
            <div class="text-sm font-medium text-gray-600 dark:text-gray-400">Devices</div>
            <div class="text-3xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.total_devices" aria-live="polite"></div>
          </a>
          <a href="/networks" @click.prevent="$dispatch('nav', '/networks')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6 hover:shadow-md hover:border-gray-400 dark:hover:border-gray-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900" role="listitem">
            <div class="text-sm font-medium text-gray-600 dark:text-gray-400">Networks</div>
            <div class="text-3xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.total_networks" aria-live="polite"></div>
          </a>
          <div class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6">
            <div class="text-sm font-medium text-gray-600 dark:text-gray-400">Pools</div>
            <div class="text-3xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.total_pools"></div>
          </div>
          <a href="/datacenters" @click.prevent="$dispatch('nav', '/datacenters')" class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6 hover:shadow-md hover:border-gray-400 dark:hover:border-gray-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900" role="listitem">
            <div class="text-sm font-medium text-gray-600 dark:text-gray-400">Datacenters</div>
            <div class="text-3xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.total_datacenters" aria-live="polite"></div>
          </a>
          <div class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6">
            <div class="text-sm font-medium text-gray-600 dark:text-gray-400">Overall Utilization</div>
            <div class="text-3xl font-bold mt-2" :class="getUtilizationColor(stats.overall_utilization)" x-text="formatUtilization(stats.overall_utilization)"></div>
          </div>
        </div>

        <!-- Two Column Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <!-- Device Status -->
          <div class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Device Status</h2>
            <div class="grid grid-cols-2 gap-4">
              <a href="/devices?status=planned" @click.prevent="$dispatch('nav', '/devices?status=planned')" class="bg-[var(--card)] rounded-lg border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md hover:border-blue-400 dark:hover:border-blue-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500">
                <div class="flex items-center gap-3">
                  <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                  <span class="text-sm text-gray-600 dark:text-gray-400">Planned</span>
                </div>
                <div class="text-2xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.device_status_counts.planned"></div>
              </a>
              <a href="/devices?status=active" @click.prevent="$dispatch('nav', '/devices?status=active')" class="bg-[var(--card)] rounded-lg border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md hover:border-green-400 dark:hover:border-green-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-green-500">
                <div class="flex items-center gap-3">
                  <div class="w-3 h-3 rounded-full bg-green-500"></div>
                  <span class="text-sm text-gray-600 dark:text-gray-400">Active</span>
                </div>
                <div class="text-2xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.device_status_counts.active"></div>
              </a>
              <a href="/devices?status=maintenance" @click.prevent="$dispatch('nav', '/devices?status=maintenance')" class="bg-[var(--card)] rounded-lg border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md hover:border-yellow-400 dark:hover:border-yellow-600 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-yellow-500">
                <div class="flex items-center gap-3">
                  <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                  <span class="text-sm text-gray-600 dark:text-gray-400">Maintenance</span>
                </div>
                <div class="text-2xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.device_status_counts.maintenance"></div>
              </a>
              <a href="/devices?status=decommissioned" @click.prevent="$dispatch('nav', '/devices?status=decommissioned')" class="bg-[var(--card)] rounded-lg border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md hover:border-gray-400 dark:hover:border-gray-500 transition-all cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-gray-500">
                <div class="flex items-center gap-3">
                  <div class="w-3 h-3 rounded-full bg-gray-400"></div>
                  <span class="text-sm text-gray-600 dark:text-gray-400">Decommissioned</span>
                </div>
                <div class="text-2xl font-bold text-gray-900 dark:text-gray-50 mt-2" x-text="stats.device_status_counts.decommissioned"></div>
              </a>
            </div>
          </div>

          <!-- Network Utilization -->
          <div class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Network Utilization</h2>
            <div class="space-y-3 max-h-64 overflow-y-auto">
              <template x-for="net in (stats.network_utilization || [])" :key="net.network_id">
                <a :href="'/networks/detail?id=' + net.network_id" @click.prevent="$dispatch('nav', '/networks/detail?id=' + net.network_id)" class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded-lg cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                  <div>
                    <div class="font-medium text-gray-900 dark:text-gray-100" x-text="net.network_name"></div>
                    <div class="text-sm text-gray-500 dark:text-gray-400" x-text="net.subnet"></div>
                  </div>
                  <div class="text-right">
                    <div class="font-bold" :class="getUtilizationColor(net.utilization)" x-text="formatUtilization(net.utilization)"></div>
                    <div class="text-sm text-gray-500 dark:text-gray-400" x-text="net.used_ips + ' / ' + net.total_ips + ' IPs'"></div>
                  </div>
                </a>
              </template>
              <div x-show="!stats.network_utilization || stats.network_utilization.length === 0" class="text-gray-500 dark:text-gray-400 text-center py-4">
                No networks configured
              </div>
            </div>
          </div>

          <!-- Recent Discoveries -->
          <div class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6">
            <div class="flex justify-between items-center mb-4">
              <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-50">Recently Discovered</h2>
              <a href="/discovery" @click.prevent="$dispatch('nav', '/discovery')" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">View all</a>
            </div>
            <div class="space-y-3">
              <template x-for="disc in (stats.recent_discoveries || [])" :key="disc.id">
                <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded-lg">
                  <div>
                    <div class="font-medium text-gray-900 dark:text-gray-100" x-text="disc.ip"></div>
                    <div class="text-sm text-gray-500 dark:text-gray-400" x-text="disc.hostname || disc.vendor || 'Unknown'"></div>
                  </div>
                  <a :href="'/discovery?highlight=' + disc.id" @click.prevent="$dispatch('nav', '/discovery?highlight=' + disc.id)" class="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 text-sm">Promote</a>
                </div>
              </template>
              <div x-show="!stats.recent_discoveries || stats.recent_discoveries.length === 0" class="text-gray-500 dark:text-gray-400 text-center py-4">
                No recent discoveries
              </div>
            </div>
            <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
              <a href="/discovery" @click.prevent="$dispatch('nav', '/discovery')" class="text-sm text-gray-600 dark:text-gray-400">
                <span x-text="stats.discovered_devices"></span> total discovered devices
              </a>
            </div>
          </div>

          <!-- Health Alerts -->
          <div class="bg-[var(--card)] rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 p-6" x-data="{ showStaleList: false }">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Health Alerts</h2>
            <div x-show="stats.stale_devices > 0" class="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-lg">
              <div class="flex items-center justify-between p-4 cursor-pointer hover:bg-yellow-100 dark:hover:bg-yellow-900/30" @click="showStaleList = !showStaleList">
                <div class="flex items-center gap-3">
                  <div class="text-yellow-600 dark:text-yellow-400">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                    </svg>
                  </div>
                  <div>
                    <div class="font-medium text-yellow-800 dark:text-yellow-200" x-text="stats.stale_devices + ' Stale Devices'"></div>
                    <div class="text-sm text-yellow-600 dark:text-yellow-400" x-text="'Not seen in discovery for ' + stats.stale_threshold_days + ' days'"></div>
                  </div>
                </div>
                <svg class="w-5 h-5 text-yellow-600 dark:text-yellow-400 transition-transform" :class="{ 'rotate-180': showStaleList }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
              <div x-show="showStaleList" x-collapse class="border-t border-yellow-200 dark:border-yellow-800">
                <div class="p-3 space-y-2 max-h-48 overflow-y-auto">
                  <template x-for="device in (stats.stale_device_list || [])" :key="device.id">
                    <a :href="'/devices/detail?id=' + device.id" @click.prevent="$dispatch('nav', '/devices/detail?id=' + device.id)" class="flex items-center justify-between p-2 bg-white dark:bg-gray-800 rounded hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                      <div class="font-medium text-gray-900 dark:text-gray-100" x-text="device.name"></div>
                      <div class="text-sm text-gray-500 dark:text-gray-400" x-text="device.hostname || '—'"></div>
                    </a>
                  </template>
                  <div x-show="stats.stale_devices > 20" class="text-center py-2">
                    <a :href="'/devices?stale=true&stale_days=' + stats.stale_threshold_days" @click.prevent="$dispatch('nav', '/devices?stale=true&stale_days=' + stats.stale_threshold_days)" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">
                      View all <span x-text="stats.stale_devices"></span> stale devices
                    </a>
                  </div>
                </div>
              </div>
            </div>
            <div x-show="stats.stale_devices === 0" class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg p-4">
              <div class="flex items-center gap-3">
                <div class="text-green-600 dark:text-green-400">
                  <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                  </svg>
                </div>
                <div class="font-medium text-green-800 dark:text-green-200">All devices healthy</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Auto-refresh indicator -->
        <div class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
          <span x-show="autoRefresh">Auto-refresh every <span x-text="refreshInterval"></span>s · </span>
          <button @click="toggleAutoRefresh()" class="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 cursor-pointer focus:outline-none focus:underline">
            <span x-text="autoRefresh ? 'Pause' : 'Resume auto-refresh'"></span>
          </button>
          <span x-show="autoRefresh"> · </span>
          <button @click="loadStats()" class="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 cursor-pointer focus:outline-none focus:underline">
            Refresh now
          </button>
        </div>
      </div>
    </template>
  </div>
</template>
