<!-- Dashboard -->
<template x-if="route === '/'">
  <div x-data="{ stats: { devices: '-', networks: '-', datacenters: '-', discovered: '-' }, async init() {
    const [d, n, dc, disc] = await Promise.all([
      window.rackdAPI?.listDevices().catch(() => []),
      window.rackdAPI?.listNetworks().catch(() => []),
      window.rackdAPI?.listDatacenters().catch(() => []),
      window.rackdAPI?.listDiscoveredDevices().catch(() => [])
    ]);
    this.stats = { devices: (d || []).length, networks: (n || []).length, datacenters: (dc || []).length, discovered: (disc || []).length };
  } }">
    <h1 class="text-2xl font-bold mb-6">Dashboard</h1>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <a href="/devices" @click.prevent="$dispatch('nav', '/devices')" class="bg-[var(--card)] rounded-lg shadow p-6 hover:shadow-md transition-shadow">
        <div class="text-sm text-[var(--muted-foreground)]">Devices</div>
        <div class="text-3xl font-bold" x-text="stats.devices"></div>
      </a>
      <a href="/networks" @click.prevent="$dispatch('nav', '/networks')" class="bg-[var(--card)] rounded-lg shadow p-6 hover:shadow-md transition-shadow">
        <div class="text-sm text-[var(--muted-foreground)]">Networks</div>
        <div class="text-3xl font-bold" x-text="stats.networks"></div>
      </a>
      <a href="/datacenters" @click.prevent="$dispatch('nav', '/datacenters')" class="bg-[var(--card)] rounded-lg shadow p-6 hover:shadow-md transition-shadow">
        <div class="text-sm text-[var(--muted-foreground)]">Datacenters</div>
        <div class="text-3xl font-bold" x-text="stats.datacenters"></div>
      </a>
      <a href="/discovery" @click.prevent="$dispatch('nav', '/discovery')" class="bg-[var(--card)] rounded-lg shadow p-6 hover:shadow-md transition-shadow">
        <div class="text-sm text-[var(--muted-foreground)]">Discovered</div>
        <div class="text-3xl font-bold" x-text="stats.discovered"></div>
      </a>
    </div>
  </div>
</template>
