<!-- Networks List -->
<template x-if="route === '/networks'">
  <div x-data="networkList()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">Networks</h1>
      <button x-show="$store.permissions.canCreate('networks')" @click="openAddModal()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]">
        Add Network
      </button>
    </div>
    <div x-show="error" class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800" role="alert" x-text="error"></div>
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex flex-wrap gap-3">
        <div>
          <label for="network-search" class="sr-only">Search networks</label>
          <input id="network-search" type="text" x-model="search" @input="applySearch()" placeholder="Search..."
                 class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <template x-if="hasMultipleDatacenters">
          <div>
            <label for="network-datacenter-filter" class="sr-only">Filter by datacenter</label>
            <select id="network-datacenter-filter" @change="setFilter($event.target.value)"
                    class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
              <option value="">All Datacenters</option>
              <template x-for="dc in datacenters" :key="dc.id">
                <option :value="dc.id" x-text="dc.name"></option>
              </template>
            </select>
          </div>
        </template>
        <button @click="clearFilters()" class="px-3 py-2 text-sm text-gray-800 dark:text-gray-200 hover:text-gray-900 dark:hover:text-white focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded cursor-pointer transition-colors min-h-[44px]">
          Clear filters
        </button>
      </div>
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of networks with name, subnet, VLAN, and datacenter</caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">Name</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">Subnet</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">VLAN</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">Datacenter</th>
            <th scope="col" class="px-6 py-3 text-center text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider"><span class="sr-only">Overlap</span></th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="loading"><td colspan="5" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200"><span role="status" aria-live="polite">Loading networks...</span></td></tr>
          <tr x-show="!loading && networks.length === 0"><td colspan="5" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">No networks found</td></tr>
          <template x-for="n in networks" :key="n.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <a :href="'/networks/detail?id=' + n.id" @click.prevent="$dispatch('nav', '/networks/detail?id=' + n.id)" class="text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline font-medium cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors" x-text="n.name"></a>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="n.subnet"></td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="n.vlan_id || '-'"></td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="getDatacenterName(n.datacenter_id)"></td>
              <td class="px-6 py-4 text-center">
                <span x-show="n.has_subnet_overlap"
                      class="px-2 py-0.5 text-xs font-medium rounded-full bg-orange-100 dark:bg-orange-900/30 text-orange-800 dark:text-orange-300"
                      title="This subnet overlaps with other networks">
                  Overlap
                </span>
                <span x-show="!n.has_subnet_overlap" class="text-gray-400 dark:text-gray-500">-</span>
              </td>
              <td class="px-6 py-4 text-right">
                <div class="inline-flex gap-1">
                  <button @click="$dispatch('nav', '/devices?network=' + n.id)" class="px-3 py-2 text-sm text-gray-800 dark:text-gray-200 hover:text-gray-900 dark:hover:text-gray-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]" :aria-label="'View devices in ' + n.name">Devices</button>
                  <button x-show="$store.permissions.canUpdate('networks')" @click="openEditModal(n)" class="px-3 py-2 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]" :aria-label="'Edit ' + n.name">Edit</button>
                  <button x-show="$store.permissions.canDelete('networks')" @click="confirmDelete(n)" class="px-3 py-2 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]" :aria-label="'Delete ' + n.name">Delete</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <!-- Delete Modal -->
    <include src="partials/modals/delete-confirm.html"></include>
    <!-- Network Modal (Add/Edit) -->
    <include src="partials/modals/network-form.html"></include>
  </div>
</template>

<!-- Network Detail -->
<template x-if="route.startsWith('/networks/detail')">
  <include src="partials/pages/network-detail.html"></include>
</template>

<!-- Pool Detail -->
<template x-if="route.startsWith('/pools/detail')">
  <include src="partials/pages/pool-detail.html"></include>
</template>
