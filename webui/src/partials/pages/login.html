<!-- Login Page -->
  <div x-data="login()" class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative" x-init="init()">
    <!-- Theme toggle -->
    <div x-data="themeToggle" class="absolute top-4 right-4">
      <button @click="setTheme(theme === 'dark' ? 'light' : theme === 'light' ? 'system' : 'dark')"
              class="p-2 rounded-md text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-[3px] focus:ring-[var(--ring)] min-w-[44px] min-h-[44px] flex items-center justify-center"
              :aria-label="'Current theme: ' + theme + '. Click to change.'">
        <svg x-show="theme === 'light'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg x-show="theme === 'dark'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg x-show="theme === 'system'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </button>
    </div>
    <div class="max-w-md w-full space-y-8 bg-[var(--card)] rounded-xl shadow-lg border border-[var(--border)] p-8">
      <div class="text-center">
        <div class="mx-auto flex-shrink-0 flex items-center justify-center h-16 w-16 rounded-full bg-[var(--primary-light)] mb-4">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-[var(--primary)]" aria-hidden="true">
            <rect class="rack-frame" x="15" y="5" width="70" height="90" rx="8" />
            <rect class="rack-unit" x="25" y="15" width="50" height="12" rx="2" />
            <rect class="rack-unit" x="25" y="32" width="50" height="12" rx="2" fill="#3B82F6"/>
            <rect class="rack-unit" x="25" y="49" width="50" height="12" rx="2" />
            <rect class="rack-unit" x="25" y="66" width="50" height="12" rx="2" fill="#EF4444"/>
            <circle cx="68" cy="21" r="2" fill="#10B981"/>
            <circle cx="68" cy="38" r="2" fill="#10B981"/>
            <circle cx="68" cy="55" r="2" fill="#EF4444"/>
            <circle cx="68" cy="72" r="2" fill="#10B981"/>
          </svg>
        </div>
        <h2 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-gray-50">
          Welcome to <span style="color: var(--core-blue)">Rack</span><span style="color: var(--accent-cyan)">d</span>
        </h2>
        <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
          Sign in to your account to continue
        </p>
      </div>

      <form @submit.prevent="submit()" class="mt-8 space-y-6" aria-labelledby="login-heading">
        <div x-show="error" 
             class="p-4 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 mb-6"
             role="alert">
          <p class="text-sm text-red-800 dark:text-red-200" x-text="error"></p>
        </div>

        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            Username
          </label>
          <input id="username" 
                 type="text" 
                 x-model="username"
                 class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-[3px] focus:ring-[var(--ring)] focus:border-[var(--primary)]"
                 :disabled="loading"
                 autocomplete="username"
                 required>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            Password
          </label>
          <input id="password" 
                 type="password" 
                 x-model="password"
                 class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-[3px] focus:ring-[var(--ring)] focus:border-[var(--primary)]"
                 :disabled="loading"
                 autocomplete="current-password"
                 required>
        </div>

        <div>
          <button type="submit"
                  :disabled="loading"
                  class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed min-h-[44px]">
            <svg x-show="loading" x-cloak class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span x-show="loading">Signing in...</span>
            <span x-show="!loading">Sign in</span>
          </button>
        </div>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600 dark:text-gray-400">
          Don't have an account? Contact your administrator to get one.
        </p>
      </div>
    </div>
  </div>
