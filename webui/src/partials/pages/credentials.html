<!-- Credentials Management -->
<template x-if="route === '/credentials'">
    <div x-data="credentialsList()">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Credentials</h1>
            <button x-show="$store.permissions.canCreate('credentials')" @click="openAddModal()"
                class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 cursor-pointer transition-colors"
                aria-label="Add new credential">
                Add Credential
            </button>
        </div>

        <div x-show="error" role="alert" aria-live="polite"
            class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 rounded-md border border-red-300 dark:border-red-800"
            x-text="error"></div>

        <div
            class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-300 dark:divide-gray-700" role="table"
                aria-label="Credentials list">
                <thead class="bg-gray-50 dark:bg-gray-700">
                    <tr>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wider">
                            Name</th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wider">
                            Type</th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wider">
                            Description</th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wider">
                            Status</th>
                        <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-300 dark:divide-gray-700">
                    <tr x-show="loading">
                        <td colspan="5" class="px-6 py-8 text-center text-gray-600 dark:text-gray-400">Loading...</td>
                    </tr>
                    <tr x-show="!loading && !hasCredentials()">
                        <td colspan="5" class="px-6 py-8 text-center text-gray-600 dark:text-gray-400">No credentials
                            found</td>
                    </tr>
                    <template x-for="cred in credentials" :key="cred.id">
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                            <td class="px-6 py-4">
                                <button x-show="$store.permissions.canUpdate('credentials')"
                                    @click="openEditModal(cred)"
                                    class="font-medium text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded cursor-pointer transition-colors"
                                    x-text="cred.name" :aria-label="getCredentialAriaLabel(cred.name, 'Edit')"></button>
                                <span x-show="!$store.permissions.canUpdate('credentials')"
                                    class="font-medium text-gray-900 dark:text-gray-50" x-text="cred.name"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 text-xs font-medium rounded-full border"
                                    :class="getTypeClass(cred.type)" x-text="cred.type.toUpperCase()"></span>
                            </td>
                            <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="cred.description || '-'">
                            </td>
                            <td class="px-6 py-4 text-gray-800 dark:text-gray-200">
                                <template x-if="cred.has_community"><span class="mr-2">Community
                                        set</span></template>
                                <template x-if="cred.has_auth"><span class="mr-2">Auth set</span></template>
                                <template x-if="cred.has_username"><span>Username set</span></template>
                            </td>
                            <td class="px-6 py-4 text-right space-x-3">
                                <button x-show="$store.permissions.canUpdate('credentials')"
                                    @click="openEditModal(cred)"
                                    class="px-3 py-1 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded cursor-pointer transition-colors"
                                    :aria-label="getCredentialAriaLabel(cred.name, 'Edit')">Edit</button>
                                <button x-show="$store.permissions.canDelete('credentials')"
                                    @click="openDeleteModal(cred)"
                                    class="px-3 py-1 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded cursor-pointer transition-colors"
                                    :aria-label="getCredentialAriaLabel(cred.name, 'Delete')">Delete</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- Credential Form Modal -->
        <div x-show="showFormModal" x-cloak class="fixed inset-0 z-50 overflow-y-auto" role="dialog" aria-modal="true"
            aria-labelledby="credential-modal-title" @keydown.escape.window="closeModal()">
            <div class="flex items-center justify-center min-h-screen px-4">
                <div class="fixed inset-0 bg-black/50" @click="closeModal()" aria-hidden="true"></div>
                <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full" role="document"
                    x-trap.inert.noscroll="showFormModal">
                    <div
                        class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700">
                        <h2 id="credential-modal-title" class="text-lg font-semibold text-gray-900 dark:text-white"
                            x-text="form.id ? 'Edit Credential' : 'Add Credential'"></h2>
                        <button @click="closeModal()"
                            class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-full p-1 cursor-pointer transition-colors"
                            aria-label="Close dialog">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <form @submit.prevent="save()">
                    <div class="p-6 space-y-4">
                        <div>
                            <label for="cred-name"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name <span
                                    class="text-red-500" aria-hidden="true">*</span></label>
                            <input type="text" id="cred-name" x-model="form.name" required aria-required="true"
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors">
                        </div>
                        <div>
                            <label for="cred-type"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Type</label>
                            <select id="cred-type" x-model="form.type"
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">
                                <option value="snmp_v2c">SNMP v2c</option>
                                <option value="snmp_v3">SNMP v3</option>
                                <option value="ssh_password">SSH (Password)</option>
                                <option value="ssh_key">SSH (Key)</option>
                            </select>
                        </div>
                        <template x-if="form.type === 'snmp_v2c'">
                            <div>
                                <label for="cred-snmp-community"
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Community
                                    String <span class="text-red-500" aria-hidden="true">*</span></label>
                                <input type="password" id="cred-snmp-community" x-model="form.snmp_community"
                                    autocomplete="off" :placeholder="form.id ? 'Leave blank to keep existing' : ''"
                                    :required="!form.id" :aria-required="!form.id"
                                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors">
                            </div>
                        </template>
                        <template x-if="form.type === 'snmp_v3'">
                            <div class="space-y-4">
                                <div>
                                    <label for="cred-snmp-v3-user"
                                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username
                                        <span class="text-red-500" aria-hidden="true">*</span></label>
                                    <input type="text" id="cred-snmp-v3-user" x-model="form.snmp_v3_user" required
                                        aria-required="true"
                                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors">
                                </div>
                                <div>
                                    <label for="cred-snmp-v3-auth"
                                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Auth
                                        Password <span class="text-red-500" aria-hidden="true">*</span></label>
                                    <input type="password" id="cred-snmp-v3-auth" x-model="form.snmp_v3_auth"
                                        autocomplete="off" :placeholder="form.id ? 'Leave blank to keep existing' : ''"
                                        :required="!form.id" :aria-required="!form.id"
                                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors">
                                </div>
                                <div>
                                    <label for="cred-snmp-v3-priv"
                                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Privacy
                                        Password <span class="text-red-500" aria-hidden="true">*</span></label>
                                    <input type="password" id="cred-snmp-v3-priv" x-model="form.snmp_v3_priv"
                                        autocomplete="off" :placeholder="form.id ? 'Leave blank to keep existing' : ''"
                                        :required="!form.id" :aria-required="!form.id"
                                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors">
                                </div>
                            </div>
                        </template>
                        <template x-if="form.type === 'ssh_password' || form.type === 'ssh_key'">
                            <div class="space-y-4">
                                <div>
                                    <label for="cred-ssh-username"
                                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username
                                        <span class="text-red-500" aria-hidden="true">*</span></label>
                                    <input type="text" id="cred-ssh-username" x-model="form.ssh_username" required
                                        aria-required="true"
                                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors">
                                </div>
                                <div>
                                    <label for="cred-ssh-secret"
                                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                        x-text="getSSHSecretLabel()"></label>
                                    <template x-if="form.type === 'ssh_password'">
                                        <input type="password" id="cred-ssh-secret" x-model="form.ssh_key_id"
                                            autocomplete="off"
                                            :placeholder="form.id ? 'Leave blank to keep existing' : ''"
                                            :required="!form.id" :aria-required="!form.id"
                                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors">
                                    </template>
                                    <template x-if="form.type === 'ssh_key'">
                                        <textarea id="cred-ssh-secret" x-model="form.ssh_key_id" rows="4"
                                            :placeholder="form.id ? 'Paste private key or leave blank to keep existing' : 'Paste private key'"
                                            :required="!form.id" :aria-required="!form.id"
                                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 font-mono text-sm transition-colors"></textarea>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <div>
                            <label for="cred-description"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
                            <textarea id="cred-description" x-model="form.description" rows="2"
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors"></textarea>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-200 dark:border-gray-700">
                        <button @click="closeModal()" type="button"
                            class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">Cancel</button>
                        <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">Save</button>
                    </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div x-show="showDeleteModal" x-cloak class="fixed inset-0 z-50 overflow-y-auto" role="alertdialog"
            aria-modal="true" aria-labelledby="delete-modal-title" aria-describedby="delete-modal-desc">
            <div class="flex items-center justify-center min-h-screen px-4">
                <div class="fixed inset-0 bg-black/50" @click="closeModal()" aria-hidden="true"></div>
                <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-sm w-full p-6" role="document"
                    x-trap.inert.noscroll="showDeleteModal" @keydown.escape.window="closeModal()">
                    <button @click="closeModal()"
                        class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-full p-1 cursor-pointer transition-colors"
                        aria-label="Close dialog">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    <h2 id="delete-modal-title" class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Delete
                        Credential</h2>
                    <p id="delete-modal-desc" class="text-gray-600 dark:text-gray-400 mb-6">Are you sure you want to
                        delete "<span x-text="getDeleteTargetName()"></span>"? This action cannot be undone.
                    </p>
                    <div class="flex justify-end gap-3">
                        <button @click="closeModal()" type="button"
                            class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">Cancel</button>
                        <button @click="deleteConfirmed()" type="button"
                            class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
