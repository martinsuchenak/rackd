<!-- API Keys Page -->
<template x-if="route === '/api-keys'">
  <div x-data="apiKeysList()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">API Keys</h1>
      <button x-show="$store.permissions.canCreate('apikeys')" @click="openCreateModal()"
        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]">
        Create API Key
      </button>
    </div>
    <div x-show="error"
      class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800"
      role="alert" x-text="error"></div>
    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of API keys with name, owner, and expiry</caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Name</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Owner</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Created</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Last Used</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Expires</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="loading">
            <td colspan="6" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">
              <span role="status" aria-live="polite">Loading API keys...</span>
            </td>
          </tr>
          <tr x-show="!loading && keys.length === 0">
            <td colspan="6" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">No API keys found</td>
          </tr>
          <template x-for="key in keys" :key="key.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <span class="font-medium text-gray-900 dark:text-gray-50" x-text="key.name"></span>
                <div x-show="key.description" class="text-xs text-gray-500 dark:text-gray-400 mt-0.5"
                  x-text="key.description"></div>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="getUserName(key.user_id)"></td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="formatDate(key.created_at)"></td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="formatDate(key.last_used_at)"></td>
              <td class="px-6 py-4">
                <span :class="isExpired(key.expires_at) ? 'text-red-700 dark:text-red-400' : 'text-gray-800 dark:text-gray-200'"
                  x-text="formatExpiry(key.expires_at)"></span>
              </td>
              <td class="px-6 py-4 text-right">
                <button x-show="$store.permissions.canDelete('apikeys')" @click="openDeleteModal(key)"
                  class="px-3 py-2 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                  :aria-label="'Delete API key ' + key.name">Delete</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Create Modal -->
    <div x-show="showCreateModal" x-cloak :class="$store.ui.modalViewport()"
      role="dialog" aria-modal="true" aria-labelledby="create-key-title" @keydown.escape.window="closeModal()">
      <div :class="$store.ui.modalBackdrop()" @click="closeModal()" aria-hidden="true"></div>
      <div :class="$store.ui.modalPanel('lg')"
        x-trap.inert.noscroll="showCreateModal">
        <button @click="closeModal()" :class="$store.ui.modalCloseButton()"
          aria-label="Close dialog">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <h2 id="create-key-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Create API Key</h2>
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">
          The key will be linked to your user account and inherit your permissions.
        </p>
        <form @submit.prevent="doCreate()">
          <div class="space-y-4">
            <div>
              <label for="key-name" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">
                Name <span aria-hidden="true">*</span><span class="sr-only">(required)</span>
              </label>
              <input id="key-name" type="text" x-model="formName" required aria-required="true"
                :aria-invalid="!!validationErrors.name"
                class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                :class="validationErrors.name ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
              <p x-show="validationErrors.name" class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert"
                x-text="validationErrors.name"></p>
            </div>
            <div>
              <label for="key-description" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
              <input id="key-description" type="text" x-model="formDescription"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            </div>
            <div>
              <label for="key-expires" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">
                Expires (optional)
              </label>
              <input id="key-expires" type="date" x-model="formExpiresAt"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            </div>
          </div>
          <div class="flex justify-end gap-3 mt-6">
            <button type="button" @click="closeModal()"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
            <button type="submit" :disabled="saving"
              class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
              <span x-show="!saving">Create</span>
              <span x-show="saving">Creating...</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Reveal Key Modal -->
    <template x-if="showRevealModal">
      <div :class="$store.ui.modalViewport()" role="dialog" aria-modal="true"
        aria-labelledby="reveal-key-title" @keydown.escape.window="closeModal()">
        <div :class="$store.ui.modalBackdrop()" @click="closeModal()" aria-hidden="true"></div>
        <div :class="$store.ui.modalPanel('lg')"
          x-trap.inert.noscroll="true">
          <button @click="closeModal()" :class="$store.ui.modalCloseButton()" aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="reveal-key-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-2">API Key Created</h2>
          <p class="text-sm text-amber-700 dark:text-amber-400 mb-4 font-medium">
            Save this key now — it will not be shown again.
          </p>
          <div class="flex gap-2 items-center">
            <code class="flex-1 px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-gray-50 rounded text-sm font-mono break-all"
              x-text="newKeyValue" aria-label="API key value"></code>
            <button @click="copyKey()"
              class="px-3 py-2 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 border border-blue-300 dark:border-blue-700 rounded hover:bg-blue-50 dark:hover:bg-blue-900/30 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px] whitespace-nowrap">
              Copy
            </button>
          </div>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-3">
            Use as: <code class="font-mono">Authorization: Bearer &lt;key&gt;</code>
          </p>
          <div class="flex justify-end mt-6">
            <button @click="closeModal()"
              class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Done</button>
          </div>
        </div>
      </div>
    </template>

    <!-- Delete Confirmation Modal -->
    <include src="partials/modals/delete-confirm.html"></include>
  </div>
</template>
