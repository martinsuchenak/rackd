<!-- Custom Fields Management Page -->
<template x-if="route === '/custom-fields'">
  <div x-data="customFieldComponent()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">Custom Fields</h1>
      <button x-show="$store.permissions.canCreate('custom-fields')" @click="openCreateModal()"
        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 min-h-[44px]">
        Add Field
      </button>
    </div>

    <div x-show="error"
      class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800"
      role="alert" x-text="error"></div>

    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of custom field definitions with name, key, type, and status</caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Name</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Key</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Type</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Required</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="loading">
            <td colspan="5" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200"><span role="status"
                aria-live="polite">Loading custom fields...</span></td>
          </tr>
          <tr x-show="!loading && !hasDefinitions()">
            <td colspan="5" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">No custom fields defined.
              <button x-show="$store.permissions.canCreate('custom-fields')" @click="openCreateModal()"
                class="text-blue-600 dark:text-blue-400 hover:underline cursor-pointer">Create your first custom
                field</button>
            </td>
          </tr>
          <template x-for="field in definitions" :key="field.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <template x-if="$store.permissions.canUpdate('custom-fields')">
                  <button @click="openEditModal(field)"
                    class="text-left cursor-pointer focus:outline-none focus:underline">
                    <div class="text-sm font-medium text-blue-600 dark:text-blue-400 hover:underline"
                      x-text="field.name"></div>
                    <div x-show="field.description" class="text-xs text-gray-500 dark:text-gray-400"
                      x-text="field.description"></div>
                  </button>
                </template>
                <template x-if="!$store.permissions.canUpdate('custom-fields')">
                  <div>
                    <div class="text-sm font-medium text-gray-900 dark:text-gray-100" x-text="field.name"></div>
                    <div x-show="field.description" class="text-xs text-gray-500 dark:text-gray-400"
                      x-text="field.description"></div>
                  </div>
                </template>
              </td>
              <td class="px-6 py-4">
                <div class="text-sm text-gray-600 dark:text-gray-400 font-mono" x-text="field.key"></div>
              </td>
              <td class="px-6 py-4">
                <span
                  class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-900 dark:bg-blue-900 dark:text-blue-200"
                  x-text="getTypeLabel(field.type)"></span>
                <div x-show="field.type === 'select' && hasOptions(field)"
                  class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                  <span x-text="firstOptions(field)"></span>
                  <span x-show="hasMoreOptions(field)" x-text="' + ' + getMoreOptionsCount(field) + ' more'"></span>
                </div>
              </td>
              <td class="px-6 py-4">
                <span x-show="field.required"
                  class="px-2 py-1 text-xs font-medium rounded-full bg-yellow-100 text-yellow-900 dark:bg-yellow-900 dark:text-yellow-200">Required</span>
                <span x-show="!field.required"
                  class="px-2 py-1 text-xs font-medium rounded-full bg-gray-100 text-gray-900 dark:bg-gray-700 dark:text-gray-200">Optional</span>
              </td>
              <td class="px-6 py-4 text-right">
                <div class="inline-flex gap-1">
                  <button x-show="$store.permissions.canUpdate('custom-fields')" @click="openEditModal(field)"
                    class="px-3 py-2 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="'Edit ' + field.name">Edit</button>
                  <button x-show="$store.permissions.canDelete('custom-fields')" @click="openDeleteModal(field)"
                    class="px-3 py-2 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                    :aria-label="'Delete ' + field.name">Delete</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Create Custom Field Modal -->
    <div x-show="showCreateModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog"
      aria-modal="true" aria-labelledby="create-modal-title" @keydown.escape.window="closeModal()">
      <div class="fixed inset-0 bg-black/50" @click="closeModal()" aria-hidden="true"></div>
      <div
        class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6 max-h-[90vh] overflow-y-auto"
        x-trap.inert.noscroll="showCreateModal">
        <button @click="closeModal()"
          class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
          aria-label="Close dialog">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <h2 id="create-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Create Custom
          Field</h2>
        <form @submit.prevent="saveField()">
          <div class="space-y-4">
            <div>
              <label for="create-name" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Name
                <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <input id="create-name" type="text" x-model="formData.name" required aria-required="true"
                :aria-invalid="!!validationErrors.name"
                :aria-describedby="validationErrors.name ? 'create-name-error' : undefined"
                class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                :class="validationErrors.name ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
              <p x-show="validationErrors.name" id="create-name-error"
                class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.name"></p>
            </div>
            <div>
              <label for="create-key" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Key <span
                  aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <input id="create-key" type="text" x-model="formData.key" required aria-required="true"
                placeholder="e.g., asset_tag" :aria-invalid="!!validationErrors.key"
                :aria-describedby="validationErrors.key ? 'create-key-error' : undefined"
                class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px] font-mono"
                :class="validationErrors.key ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
              <p x-show="validationErrors.key" id="create-key-error" class="mt-1 text-sm text-red-700 dark:text-red-300"
                role="alert" x-text="validationErrors.key"></p>
              <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Unique identifier for API access. Use lowercase
                letters, numbers, and underscores only.</p>
            </div>
            <div>
              <label for="create-type" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Type
                <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <select id="create-type" x-model="formData.type" required aria-required="true"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                <template x-for="ft in fieldTypes" :key="ft.value">
                  <option :value="ft.value" x-text="ft.label"></option>
                </template>
              </select>
            </div>
            <div x-show="isSelectType()">
              <label for="create-options"
                class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Options <span
                  aria-hidden="true">*</span><span class="sr-only">(required for select type)</span></label>
              <input id="create-options" type="text" x-model="formData.options"
                placeholder="production, staging, development" :aria-invalid="!!validationErrors.options"
                :aria-describedby="validationErrors.options ? 'create-options-error' : undefined"
                class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                :class="validationErrors.options ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
              <p x-show="validationErrors.options" id="create-options-error"
                class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.options"></p>
              <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Comma-separated list of options</p>
            </div>
            <div>
              <label for="create-description"
                class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
              <textarea id="create-description" x-model="formData.description" rows="2"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"></textarea>
            </div>
            <div class="flex items-center">
              <input id="create-required" type="checkbox" x-model="formData.required"
                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
              <label for="create-required" class="ml-2 text-sm text-gray-800 dark:text-gray-200">Required field</label>
            </div>
          </div>
          <div class="mt-6 flex justify-end gap-3">
            <button type="button" @click="closeModal()"
              class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">Cancel</button>
            <button type="submit" :disabled="saving"
              class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 disabled:opacity-50 min-h-[44px]">
              <span x-show="!saving">Create</span>
              <span x-show="saving">Creating...</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Edit Custom Field Modal -->
    <div x-show="showEditModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog"
      aria-modal="true" aria-labelledby="edit-modal-title" @keydown.escape.window="closeModal()">
      <div class="fixed inset-0 bg-black/50" @click="closeModal()" aria-hidden="true"></div>
      <div
        class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6 max-h-[90vh] overflow-y-auto"
        x-trap.inert.noscroll="showEditModal">
        <button @click="closeModal()"
          class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
          aria-label="Close dialog">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <h2 id="edit-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Edit Custom Field
        </h2>
        <form @submit.prevent="saveField()">
          <div class="space-y-4">
            <div>
              <label for="edit-name" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Name <span
                  aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <input id="edit-name" type="text" x-model="formData.name" required aria-required="true"
                :aria-invalid="!!validationErrors.name"
                :aria-describedby="validationErrors.name ? 'edit-name-error' : undefined"
                class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                :class="validationErrors.name ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
              <p x-show="validationErrors.name" id="edit-name-error" class="mt-1 text-sm text-red-700 dark:text-red-300"
                role="alert" x-text="validationErrors.name"></p>
            </div>
            <div>
              <label for="edit-key" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Key <span
                  aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <input id="edit-key" type="text" x-model="formData.key" required aria-required="true"
                :aria-invalid="!!validationErrors.key"
                :aria-describedby="validationErrors.key ? 'edit-key-error' : undefined"
                class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px] font-mono"
                :class="validationErrors.key ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
              <p x-show="validationErrors.key" id="edit-key-error" class="mt-1 text-sm text-red-700 dark:text-red-300"
                role="alert" x-text="validationErrors.key"></p>
            </div>
            <div>
              <label for="edit-type" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Type <span
                  aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <select id="edit-type" x-model="formData.type" required aria-required="true"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
                <template x-for="ft in fieldTypes" :key="ft.value">
                  <option :value="ft.value" x-text="ft.label"></option>
                </template>
              </select>
            </div>
            <div x-show="isSelectType()">
              <label for="edit-options" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Options
                <span aria-hidden="true">*</span><span class="sr-only">(required for select type)</span></label>
              <input id="edit-options" type="text" x-model="formData.options"
                placeholder="production, staging, development" :aria-invalid="!!validationErrors.options"
                :aria-describedby="validationErrors.options ? 'edit-options-error' : undefined"
                class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                :class="validationErrors.options ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
              <p x-show="validationErrors.options" id="edit-options-error"
                class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.options"></p>
              <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Comma-separated list of options</p>
            </div>
            <div>
              <label for="edit-description"
                class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
              <textarea id="edit-description" x-model="formData.description" rows="2"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"></textarea>
            </div>
            <div class="flex items-center">
              <input id="edit-required" type="checkbox" x-model="formData.required"
                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
              <label for="edit-required" class="ml-2 text-sm text-gray-800 dark:text-gray-200">Required field</label>
            </div>
          </div>
          <div class="mt-6 flex justify-end gap-3">
            <button type="button" @click="closeModal()"
              class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">Cancel</button>
            <button type="submit" :disabled="saving"
              class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 disabled:opacity-50 min-h-[44px]">
              <span x-show="!saving">Save</span>
              <span x-show="saving">Saving...</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div x-show="showDeleteModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4"
      role="alertdialog" aria-modal="true" aria-labelledby="delete-modal-title" aria-describedby="delete-modal-desc"
      @keydown.escape.window="closeDeleteModal()">
      <div class="fixed inset-0 bg-black/50" @click="closeDeleteModal()" aria-hidden="true"></div>
      <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full p-6"
        x-trap.inert.noscroll="showDeleteModal">
        <h2 id="delete-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-2">Delete Custom
          Field</h2>
        <p id="delete-modal-desc" class="text-gray-600 dark:text-gray-300 mb-4">Are you sure you want to delete <strong
            x-text="getSelectedFieldName()"></strong>? This will also delete all values assigned to
          devices. This action cannot be undone.</p>
        <div class="flex justify-end gap-3">
          <button @click="closeDeleteModal()"
            class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">Cancel</button>
          <button @click="doDeleteField()" :disabled="deleting"
            class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700 focus:outline-none focus:ring-[3px] focus:ring-red-500 disabled:opacity-50 min-h-[44px]">
            <span x-show="!deleting">Delete</span>
            <span x-show="deleting">Deleting...</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</template>
