<!-- Roles Management Page -->
<template x-if="route === '/roles'">
  <div x-data="rolesList()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">Roles</h1>
      <button x-show="$store.permissions.canCreate('roles')" @click="openCreateModal()"
        class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
        Create Role
      </button>
    </div>
    <div x-show="error"
      class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800"
      role="alert" x-text="error"></div>
    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex-wrap gap-3">
        <div>
          <label for="filter-name" class="sr-only">Search by name</label>
          <input id="filter-name" type="text" x-model="filter.name" @input.debounce.300="applyFilter()"
            placeholder="Search by name..."
            class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <button @click="clearFilter()"
          class="px-3 py-2 text-sm text-gray-800 dark:text-gray-200 hover:text-gray-900 dark:hover:text-white focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded cursor-pointer transition-colors min-h-[44px]">
          Clear filters
        </button>
      </div>
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of roles</caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Name</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Description</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              System</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Permissions</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Created</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="loading">
            <td colspan="5" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200"><span role="status"
                aria-live="polite">Loading roles...</span></td>
          </tr>
          <tr x-show="!loading && pagedRoles.length === 0">
            <td colspan="5" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">No roles found</td>
          </tr>
          <template x-for="role in pagedRoles" :key="role.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <button x-show="role.is_system" @click="openViewModal(role)"
                  class="font-medium text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors"
                  x-text="role.name" :aria-label="'View ' + role.name"></button>
                <button x-show="!role.is_system" @click="openEditModal(role)"
                  class="font-medium text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors"
                  x-text="role.name" :aria-label="'Edit ' + role.name"></button>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="role.description || '-'"></td>
              <td class="px-6 py-4 text-center">
                <span x-show="role.is_system"
                  class="px-2 py-1 text-xs font-medium rounded-full bg-green-100 text-green-900 dark:bg-green-900 dark:text-green-200">Yes</span>
                <span x-show="!role.is_system"
                  class="px-2 py-1 text-xs font-medium rounded-full bg-gray-100 text-gray-900 dark:bg-gray-700 dark:text-gray-200">No</span>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200">
                <span x-text="role.permissions ? role.permissions.length : 0"></span> permissions
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="formatDate(role.created_at)"></td>
              <td class="px-6 py-4 text-right">
                <div class="inline-flex gap-1">
                  <button @click="openEditModal(role)" x-show="!role.is_system && $store.permissions.canUpdate('roles')"
                    class="px-3 py-2 text-sm text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px]"
                    :aria-label="'Edit ' + role.name">Edit</button>
                  <button @click="openDeleteModal(role)"
                    x-show="!role.is_system && $store.permissions.canDelete('roles')"
                    class="px-3 py-2 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px]"
                    :aria-label="'Delete ' + role.name">Delete</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      <nav x-show="totalPages > 1"
        class="px-6 py-3 border-t border-gray-200 dark:border-gray-700 flex items-center justify-between"
        aria-label="Pagination">
        <span class="text-sm text-gray-800 dark:text-gray-200">Page <span x-text="page"></span> of <span
            x-text="totalPages"></span></span>
        <div class="flex gap-2">
          <button @click="goToPage(page - 1)" :disabled="page === 1"
            class="px-4 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 disabled:opacity-50 cursor-pointer disabled:cursor-not-allowed focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors min-h-[44px]"
            aria-label="Go to previous page">Previous</button>
          <button @click="goToPage(page + 1)" :disabled="page === totalPages"
            class="px-4 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 disabled:opacity-50 cursor-pointer disabled:cursor-not-allowed focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors min-h-[44px]"
            aria-label="Go to next page">Next</button>
        </div>
      </nav>
    </div>

    <!-- Create Role Modal -->
    <div x-show="showCreateModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog"
      aria-modal="true" aria-labelledby="create-modal-title" @keydown.escape.window="closeCreateModal()">
      <div class="fixed inset-0 bg-black/50" @click="closeCreateModal()" aria-hidden="true"></div>
      <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6"
        x-trap.inert.noscroll="showCreateModal">
        <button @click="closeCreateModal()"
          class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
          aria-label="Close dialog">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <h2 id="create-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Create Role</h2>
        <form @submit.prevent="doCreateRole()">
          <div class="space-y-4">
            <div>
              <label for="create-name" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Name
                <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
              <input id="create-name" type="text" x-model="createForm.name" required aria-required="true"
                :aria-invalid="!!validationErrors.name"
                :aria-describedby="validationErrors.name ? 'create-name-error' : undefined"
                class="w-full px-3 py-2 border rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]"
                :class="validationErrors.name ? 'border-red-600 dark:border-red-400' : 'border-gray-300 dark:border-gray-600'">
              <p x-show="validationErrors.name" id="create-name-error"
                class="mt-1 text-sm text-red-700 dark:text-red-300" role="alert" x-text="validationErrors.name"></p>
            </div>
            <div>
              <label for="create-description"
                class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
              <input id="create-description" type="text" x-model="createForm.description"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-2">Permissions</label>
              <div
                class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-48 overflow-y-auto border border-gray-300 dark:border-gray-600 rounded-md p-2">
                <template x-for="permission in availablePermissions" :key="permission.id">
                  <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" :id="'perm-' + permission.id" :value="permission.id"
                      x-model="selectedPermissionIds"
                      class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <span class="text-sm text-gray-700 dark:text-gray-300" x-text="permission.name"></span>
                  </label>
                </template>
              </div>
            </div>
          </div>
          <div class="flex justify-end gap-3 mt-6">
            <button type="button" @click="closeCreateModal()"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
            <button type="submit" :disabled="saving"
              class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
              <span x-show="!saving">Create Role</span>
              <span x-show="saving">Creating...</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Edit Role Modal -->
    <template x-if="showEditModal && selectedRole">
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true"
        aria-labelledby="edit-modal-title" @keydown.escape.window="closeEditModal()">
        <div class="fixed inset-0 bg-black/50" @click="closeEditModal()" aria-hidden="true"></div>
        <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6"
          x-trap.inert.noscroll="true">
          <button @click="closeEditModal()"
            class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="Close dialog">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="edit-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Edit Role</h2>
          <form @submit.prevent="doUpdateRole()">
            <div class="space-y-4">
              <div>
                <label for="edit-description"
                  class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
                <input id="edit-description" type="text" x-model="editForm.description"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-2">Permissions</label>
                <div
                  class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-48 overflow-y-auto border border-gray-300 dark:border-gray-600 rounded-md p-2">
                  <template x-for="permission in availablePermissions" :key="permission.id">
                    <label class="flex items-center space-x-2 cursor-pointer">
                      <input type="checkbox" :id="'edit-perm-' + permission.id" :value="permission.id"
                        x-model="selectedPermissionIds"
                        class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                      <span class="text-sm text-gray-700 dark:text-gray-300" x-text="permission.name"></span>
                    </label>
                  </template>
                </div>
              </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
              <button type="button" @click="closeEditModal()"
                class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
              <button type="submit" :disabled="saving"
                class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
                <span x-show="!saving">Save Changes</span>
                <span x-show="saving">Saving...</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </template>

    <!-- View Role Modal (for system roles) -->
    <div x-show="showViewModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog"
      aria-modal="true" aria-labelledby="view-modal-title" @keydown.escape.window="closeViewModal()">
      <div class="fixed inset-0 bg-black/50" @click="closeViewModal()" aria-hidden="true"></div>
      <div
        class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6 max-h-[80vh] overflow-y-auto"
        x-trap.inert.noscroll="showViewModal">
        <button @click="closeViewModal()"
          class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
          aria-label="Close dialog">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <div class="flex items-center gap-3 mb-4">
          <h2 id="view-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50"
            x-text="getSelectedRoleName()"></h2>
          <span
            class="px-2 py-1 text-xs font-medium rounded-full bg-green-100 text-green-900 dark:bg-green-900 dark:text-green-200">System
            Role</span>
        </div>
        <p x-show="hasSelectedRoleDescription()" class="text-sm text-gray-600 dark:text-gray-400 mb-4"
          x-text="getSelectedRoleDescription()"></p>

        <div class="mb-2">
          <h3 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Permissions (<span
              x-text="getSelectedRolePermissionsCount()"></span>)</h3>
        </div>

        <div class="space-y-3">
          <template x-for="(perms, resource) in groupedPermissions" :key="resource">
            <div>
              <h4 class="text-xs font-semibold text-gray-500 dark:text-gray-500 uppercase tracking-wider mb-1"
                x-text="resource"></h4>
              <div class="flex flex-wrap gap-1">
                <template x-for="perm in perms" :key="perm.id">
                  <span
                    class="px-2 py-0.5 text-xs rounded bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300"
                    x-text="perm.action"></span>
                </template>
              </div>
            </div>
          </template>
        </div>

        <div class="flex justify-end mt-6 pt-4 border-t border-gray-200 dark:border-gray-700">
          <button type="button" @click="closeViewModal()"
            class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Close</button>
        </div>
      </div>
    </div>

    <!-- Delete Role Modal -->
    <div x-show="showDeleteModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog"
      aria-modal="true" aria-labelledby="delete-modal-title" @keydown.escape.window="closeDeleteModal()">
      <div class="fixed inset-0 bg-black/50" @click="closeDeleteModal()" aria-hidden="true"></div>
      <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full p-6"
        x-trap.inert.noscroll="showDeleteModal">
        <h2 id="delete-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Delete Role</h2>
        <p class="text-sm text-gray-800 dark:text-gray-200 mb-6">Are you sure you want to delete the role <strong
            x-text="getSelectedRoleName()"></strong>? This action cannot be undone.</p>
        <div class="flex justify-end gap-3">
          <button type="button" @click="closeDeleteModal()"
            class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
          <button type="button" @click="doDeleteRole()" :disabled="deleting"
            class="px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
            <span x-show="!deleting">Delete Role</span>
            <span x-show="deleting">Deleting...</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</template>
