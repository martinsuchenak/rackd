<template x-if="route === '/oauth-clients'">
<div x-data="oauthClients()" class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">OAuth Clients</h1>
  </div>

  <!-- Error -->
  <template x-if="error">
    <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4">
      <p class="text-sm text-red-600 dark:text-red-400" x-text="error"></p>
    </div>
  </template>

  <!-- Loading -->
  <template x-if="loading">
    <div class="text-center py-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
    </div>
  </template>

  <!-- Client List -->
  <template x-if="!loading">
    <div>
      <template x-if="clients.length === 0">
        <div class="text-center py-12 text-gray-500 dark:text-gray-400">
          <p>No OAuth clients registered.</p>
          <p class="text-sm mt-1">MCP clients will register automatically when they connect.</p>
        </div>
      </template>

      <template x-if="clients.length > 0">
        <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden">
          <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
            <thead class="bg-gray-50 dark:bg-gray-900">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Client</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Client ID</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Type</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Redirect URIs</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Created</th>
                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
              <template x-for="client in clients" :key="client.client_id">
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700">
                  <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm font-medium text-gray-900 dark:text-white" x-text="client.client_name"></div>
                    <template x-if="client.client_uri">
                      <div class="text-xs text-gray-500 dark:text-gray-400" x-text="client.client_uri"></div>
                    </template>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap">
                    <code class="text-xs text-gray-600 dark:text-gray-400 bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded" x-text="client.client_id"></code>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap">
                    <span
                      class="inline-flex px-2 py-1 text-xs font-medium rounded-full"
                      :class="client.is_confidential ? 'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-400' : 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400'"
                      x-text="client.is_confidential ? 'Confidential' : 'Public'"
                    ></span>
                  </td>
                  <td class="px-6 py-4">
                    <template x-for="uri in client.redirect_uris" :key="uri">
                      <div class="text-xs text-gray-600 dark:text-gray-400 truncate max-w-xs" x-text="uri"></div>
                    </template>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="formatDate(client.created_at)"></td>
                  <td class="px-6 py-4 whitespace-nowrap text-right">
                    <button
                      @click="confirmDelete(client)"
                      class="text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300 text-sm"
                    >Delete</button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>
    </div>
  </template>

  <!-- Delete Confirmation Modal -->
  <template x-if="showDeleteModal">
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl p-6 max-w-sm w-full mx-4">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-2">Delete OAuth Client</h3>
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">
          Are you sure you want to delete <span class="font-medium" x-text="deleteTarget?.client_name"></span>?
          This will revoke all active tokens for this client.
        </p>
        <div class="flex space-x-3 justify-end">
          <button @click="cancelDelete()" class="px-4 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
          <button @click="doDelete()" class="px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700">Delete</button>
        </div>
      </div>
    </div>
  </template>
</div>
</template>
