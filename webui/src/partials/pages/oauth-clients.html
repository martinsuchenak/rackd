<template x-if="route === '/oauth-clients'">
  <div x-data="oauthClients()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-50">OAuth Clients</h1>
    </div>

    <div x-show="error"
      class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200 rounded-md border border-red-300 dark:border-red-800"
      role="alert" x-text="error"></div>

    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-300 dark:border-gray-700 overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <caption class="sr-only">List of registered OAuth clients</caption>
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Client</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Client ID</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Type</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Redirect URIs</th>
            <th scope="col"
              class="px-6 py-3 text-left text-xs font-medium text-gray-800 dark:text-gray-200 uppercase tracking-wider">
              Created</th>
            <th scope="col" class="px-6 py-3"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr x-show="loading">
            <td colspan="6" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">
              <span role="status" aria-live="polite">Loading OAuth clients...</span>
            </td>
          </tr>
          <tr x-show="!loading && clients.length === 0">
            <td colspan="6" class="px-6 py-8 text-center text-gray-800 dark:text-gray-200">
              No OAuth clients registered. MCP clients will register automatically when they connect.
            </td>
          </tr>
          <template x-for="client in clients" :key="client.client_id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
              <td class="px-6 py-4">
                <span class="font-medium text-gray-800 dark:text-gray-200" x-text="client.client_name"></span>
                <div x-show="client.client_uri" class="text-xs text-gray-500 dark:text-gray-400" x-text="client.client_uri"></div>
              </td>
              <td class="px-6 py-4">
                <code class="text-xs text-gray-800 dark:text-gray-200 bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded font-mono"
                  x-text="client.client_id"></code>
              </td>
              <td class="px-6 py-4">
                <span class="inline-flex px-2 py-1 text-xs font-medium rounded-full"
                  :class="getClientTypeClass(client)" x-text="getClientTypeLabel(client)"></span>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200">
                <template x-for="uri in client.redirect_uris" :key="uri">
                  <div class="text-xs font-mono truncate max-w-xs" x-text="uri"></div>
                </template>
              </td>
              <td class="px-6 py-4 text-gray-800 dark:text-gray-200" x-text="formatDate(client.created_at)"></td>
              <td class="px-6 py-4 text-right">
                <button x-show="$store.permissions.canDelete('users')" @click="confirmDelete(client)"
                  class="px-3 py-2 text-sm text-red-800 dark:text-red-200 hover:text-red-900 dark:hover:text-red-100 hover:underline cursor-pointer focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 rounded transition-colors min-h-[44px] min-w-[44px]"
                  :aria-label="'Delete client ' + client.client_name">Delete</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Delete Confirmation Modal -->
    <template x-if="showDeleteModal">
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4" role="alertdialog" aria-modal="true"
        aria-labelledby="delete-client-title" aria-describedby="delete-client-desc"
        @keydown.escape.window="cancelDelete()">
        <div class="fixed inset-0 bg-black/50" @click="cancelDelete()" aria-hidden="true"></div>
        <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full p-6"
          x-trap.inert.noscroll="true">
          <h2 id="delete-client-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4">Delete OAuth Client</h2>
          <p id="delete-client-desc" class="text-gray-800 dark:text-gray-200 mb-6">
            Are you sure you want to delete <strong x-text="getDeleteTargetName()"></strong>?
            This will revoke all active tokens for this client.
          </p>
          <div class="flex justify-end gap-3">
            <button @click="cancelDelete()"
              class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
            <button @click="doDelete()"
              class="px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700 focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Delete</button>
          </div>
        </div>
      </div>
    </template>
  </div>
</template>
