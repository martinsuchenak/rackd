<div x-show="showDeviceModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="device-modal-title" @keydown.escape.window="closeModal()">
  <div class="fixed inset-0 bg-black/50" @click="closeModal()" aria-hidden="true"></div>
  <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-2xl w-full flex flex-col" style="max-height: 85vh;">
    <!-- Close button -->
    <button @click="closeModal()" class="absolute top-4 right-4 z-10 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-full p-1 cursor-pointer transition-colors" aria-label="Close dialog">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <!-- Modal Header -->
    <div class="flex-shrink-0 px-6 pt-6 pb-4 border-b border-gray-200 dark:border-gray-700">
      <h2 id="device-modal-title" class="text-lg font-semibold text-gray-900 dark:text-white" x-text="isEditMode ? 'Edit Device' : 'Add Device'"></h2>
      <!-- Tabs -->
      <div class="flex gap-1 mt-4 -mb-4">
        <button type="button" @click="modalTab = 'general'" :class="modalTab === 'general' ? 'border-blue-500 text-blue-600 dark:text-blue-400' : 'border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300'" class="px-4 py-2 text-sm font-medium border-b-2 transition-colors">General</button>
        <button type="button" @click="modalTab = 'addresses'" :class="modalTab === 'addresses' ? 'border-blue-500 text-blue-600 dark:text-blue-400' : 'border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300'" class="px-4 py-2 text-sm font-medium border-b-2 transition-colors">
          Addresses
          <span x-show="editDevice.addresses?.length" class="ml-1 px-1.5 py-0.5 text-xs bg-gray-200 dark:bg-gray-600 rounded-full" x-text="editDevice.addresses?.length"></span>
        </button>
        <button type="button" @click="modalTab = 'tags'" :class="modalTab === 'tags' ? 'border-blue-500 text-blue-600 dark:text-blue-400' : 'border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300'" class="px-4 py-2 text-sm font-medium border-b-2 transition-colors">
          Tags & Domains
          <span x-show="(editDevice.tags?.length || 0) + (editDevice.domains?.length || 0)" class="ml-1 px-1.5 py-0.5 text-xs bg-gray-200 dark:bg-gray-600 rounded-full" x-text="(editDevice.tags?.length || 0) + (editDevice.domains?.length || 0)"></span>
        </button>
      </div>
    </div>
    <!-- Modal Body -->
    <form @submit.prevent="saveDevice()" class="flex flex-col flex-1 min-h-0">
      <div class="flex-1 overflow-y-auto px-6 py-4">
        <!-- General Tab -->
        <div x-show="modalTab === 'general'" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name *</label>
              <input type="text" x-model="editDevice.name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Hostname</label>
              <input type="text" x-model="editDevice.hostname" placeholder="e.g., server01.example.com" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Make/Model</label>
              <input type="text" x-model="editDevice.make_model" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">OS</label>
              <input type="text" x-model="editDevice.os" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
            <textarea x-model="editDevice.description" rows="2" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <template x-if="hasMultipleDatacenters">
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Datacenter</label>
                <select x-model="editDevice.datacenter_id" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">None</option>
                  <template x-for="dc in datacenters" :key="dc.id">
                    <option :value="dc.id" x-text="dc.name"></option>
                  </template>
                </select>
              </div>
            </template>
            <div :class="!hasMultipleDatacenters ? 'md:col-span-2' : ''">
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Location</label>
              <input type="text" x-model="editDevice.location" placeholder="e.g., Rack 5, Unit 12" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
            <input type="text" x-model="editDevice.username" placeholder="e.g., admin, root" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
        <!-- Addresses Tab -->
        <div x-show="modalTab === 'addresses'">
          <div class="space-y-3">
            <template x-for="(addr, index) in editDevice.addresses || []" :key="index">
              <div class="p-4 bg-gray-50 dark:bg-gray-700/30 rounded-md border border-gray-200 dark:border-gray-600">
                <div class="flex items-center justify-between mb-3">
                  <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Address #<span x-text="index + 1"></span></span>
                  <button type="button" @click="removeAddress(index)" class="text-sm text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300">&times; Remove</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                  <div>
                    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Network</label>
                    <select x-model="addr.network_id" @change="addr.pool_id = ''; loadPoolsForNetwork(addr.network_id)" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                      <option value="">No Network</option>
                      <template x-for="net in networks" :key="net.id">
                        <option :value="net.id" :selected="net.id === addr.network_id" x-text="net.name"></option>
                      </template>
                    </select>
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Pool</label>
                    <div class="flex gap-2">
                      <select x-model="addr.pool_id" @focus="loadPoolsForNetwork(addr.network_id)" class="flex-1 px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">No Pool</option>
                        <template x-for="pool in getPoolsForNetwork(addr.network_id)" :key="pool.id">
                          <option :value="pool.id" :selected="pool.id === addr.pool_id" x-text="pool.name"></option>
                        </template>
                      </select>
                      <button type="button" @click="fetchNextIPForAddress(index)" x-show="addr.pool_id" class="px-3 py-2 text-sm bg-green-600 text-white rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 whitespace-nowrap">Next IP</button>
                    </div>
                  </div>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-3">
                  <div>
                    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">IP Address *</label>
                    <input type="text" x-model="addr.ip" placeholder="192.168.1.100" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Port</label>
                    <input type="number" x-model.number="addr.port" placeholder="22" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Type</label>
                    <select x-model="addr.type" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                      <option value="ipv4">IPv4</option>
                      <option value="ipv6">IPv6</option>
                    </select>
                  </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Label</label>
                    <input type="text" x-model="addr.label" placeholder="Management, WAN" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Switch Port</label>
                    <input type="text" x-model="addr.switch_port" placeholder="Gi0/1, Eth1/24" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                  </div>
                </div>
              </div>
            </template>
          </div>
          <button type="button" @click="addAddress()" class="mt-3 w-full px-4 py-2 text-sm border-2 border-dashed border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400 rounded-md hover:border-blue-500 hover:text-blue-500 dark:hover:border-blue-400 dark:hover:text-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
            + Add Address
          </button>
          <p x-show="!editDevice.addresses?.length" class="mt-4 text-center text-sm text-gray-500 dark:text-gray-400">No addresses added yet. Click the button above to add one.</p>
        </div>
        <!-- Tags & Domains Tab -->
        <div x-show="modalTab === 'tags'" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Tags</label>
            <div class="flex gap-2 mb-2">
              <input type="text" x-model="tagInput" @keydown.enter.prevent="addTag()" placeholder="Add tag..." class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <button type="button" @click="addTag()" class="px-4 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-md hover:bg-gray-300 dark:hover:bg-gray-500">Add</button>
            </div>
            <div class="flex flex-wrap gap-2" x-show="editDevice.tags?.length > 0">
              <template x-for="tag in editDevice.tags || []" :key="tag">
                <span class="inline-flex items-center px-2 py-1 text-sm bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300 rounded">
                  <span x-text="tag"></span>
                  <button type="button" @click="removeTag(tag)" class="ml-1 text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-200">&times;</button>
                </span>
              </template>
            </div>
            <p x-show="!editDevice.tags?.length" class="text-sm text-gray-500 dark:text-gray-400">No tags added yet.</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Domains</label>
            <div class="flex gap-2 mb-2">
              <input type="text" x-model="domainInput" @keydown.enter.prevent="addDomain()" placeholder="Add domain..." class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <button type="button" @click="addDomain()" class="px-4 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-md hover:bg-gray-300 dark:hover:bg-gray-500">Add</button>
            </div>
            <div class="flex flex-wrap gap-2" x-show="editDevice.domains?.length > 0">
              <template x-for="domain in editDevice.domains || []" :key="domain">
                <span class="inline-flex items-center px-2 py-1 text-sm bg-purple-100 dark:bg-purple-900/30 text-purple-800 dark:text-purple-300 rounded">
                  <span x-text="domain"></span>
                  <button type="button" @click="removeDomain(domain)" class="ml-1 text-purple-600 dark:text-purple-400 hover:text-purple-800 dark:hover:text-purple-200">&times;</button>
                </span>
              </template>
            </div>
            <p x-show="!editDevice.domains?.length" class="text-sm text-gray-500 dark:text-gray-400">No domains added yet.</p>
          </div>
        </div>
      </div>
      <!-- Modal Footer -->
      <div class="flex-shrink-0 flex justify-end gap-3 px-6 py-4 border-t border-gray-200 dark:border-gray-700">
        <button type="button" @click="closeModal()" class="px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">Cancel</button>
        <button type="submit" :disabled="saving" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">
          <span x-show="!saving" x-text="isEditMode ? 'Save Changes' : 'Create Device'"></span>
          <span x-show="saving" x-text="isEditMode ? 'Saving...' : 'Creating...'"></span>
        </button>
      </div>
    </form>
  </div>
</div>
