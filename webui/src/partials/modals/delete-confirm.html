<!--
  Unified Delete Confirmation Modal
  Expects parent scope to have:
  - showDeleteModal: boolean
  - deleteModalTitle: string (e.g., "Delete Device")
  - deleteModalName: string (name of item being deleted)
  - deleteModalDescription?: string
  - deleting: boolean
  - cancelDelete(): function
  - doDelete(): function
-->
<div x-show="showDeleteModal" x-cloak :class="$store.ui.modalViewport()" role="alertdialog" aria-modal="true" aria-labelledby="delete-confirm-title" aria-describedby="delete-confirm-desc" @keydown.escape.window="cancelDelete()">
  <div :class="$store.ui.modalBackdrop()" @click="cancelDelete()" aria-hidden="true"></div>
  <div :class="$store.ui.modalPanel('md')" x-trap.inert.noscroll="showDeleteModal">
    <button @click="cancelDelete()" :class="$store.ui.modalCloseButton()" aria-label="Close dialog">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <h2 id="delete-confirm-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4" x-text="deleteModalTitle"></h2>
    <p id="delete-confirm-desc" class="text-gray-800 dark:text-gray-200 mb-6" x-text="$data.deleteModalDescription || ('Are you sure you want to delete ' + ($data.deleteModalName || '') + '? This action cannot be undone.')"></p>
    <div class="flex justify-end gap-3">
      <button @click="cancelDelete()" class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
      <button @click="doDelete()" :disabled="deleting" class="px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
        <span x-show="!deleting">Delete</span>
        <span x-show="deleting">Deleting...</span>
      </button>
    </div>
  </div>
</div>
