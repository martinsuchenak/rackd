<div x-show="showPromoteModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-black/50" @click="showPromoteModal = false"></div>
  <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
    <div class="p-6">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Promote to Device</h3>

      <form @submit.prevent="doPromote()">
        <div class="space-y-6">
          <!-- Device Summary -->
          <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-md space-y-3">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <div class="text-xs text-gray-500 dark:text-gray-400 uppercase">IP Address</div>
                <div class="font-mono text-sm font-medium text-gray-900 dark:text-white" x-text="getPromoteIP()"></div>
              </div>
              <div x-show="hasMAC()">
                <div class="text-xs text-gray-500 dark:text-gray-400 uppercase">MAC Address</div>
                <div class="font-mono text-sm text-gray-700 dark:text-gray-300" x-text="getPromoteMAC()"></div>
              </div>
            </div>

            <div x-show="hasHostname()" class="border-t border-gray-200 dark:border-gray-600 pt-3">
              <div class="text-xs text-gray-500 dark:text-gray-400 uppercase">Hostname</div>
              <div class="text-sm font-medium text-gray-900 dark:text-white" x-text="getPromoteHostname()"></div>
            </div>

            <div class="grid grid-cols-2 gap-4 border-t border-gray-200 dark:border-gray-600 pt-3">
              <div x-show="hasOS()">
                <div class="text-xs text-gray-500 dark:text-gray-400 uppercase">Operating System</div>
                <div class="text-sm text-gray-700 dark:text-gray-300" x-text="getPromoteOS()">
                </div>
              </div>
              <div x-show="hasVendor()">
                <div class="text-xs text-gray-500 dark:text-gray-400 uppercase">Vendor</div>
                <div class="text-sm text-gray-700 dark:text-gray-300" x-text="getPromoteVendor()">
                </div>
              </div>
            </div>

            <!-- Open Ports -->
            <template x-if="hasOpenPorts()">
              <div class="border-t border-gray-200 dark:border-gray-600 pt-3">
                <div class="text-xs text-gray-500 dark:text-gray-400 uppercase mb-2">Open Ports</div>
                <div class="flex flex-wrap gap-1">
                  <template x-for="port in getOpenPorts()" :key="port">
                    <span
                      class="px-2 py-1 text-xs font-mono rounded bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400"
                      x-text="port"></span>
                  </template>
                </div>
              </div>
            </template>

            <!-- Services -->
            <template x-if="hasServices()">
              <div class="border-t border-gray-200 dark:border-gray-600 pt-3">
                <div class="text-xs text-gray-500 dark:text-gray-400 uppercase mb-2">Detected Services</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                  <template x-for="svc in getServices()" :key="svc.port + svc.service">
                    <div
                      class="flex items-center justify-between px-3 py-2 bg-white dark:bg-gray-800 rounded border border-gray-200 dark:border-gray-600">
                      <div class="flex items-center gap-2">
                        <span
                          class="px-1.5 py-0.5 text-xs rounded bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400"
                          x-text="svc.service"></span>
                        <span class="text-sm text-gray-700 dark:text-gray-300" x-text="getServiceLabel(svc)"></span>
                      </div>
                      <template x-if="svc.version">
                        <span class="text-xs text-gray-500 dark:text-gray-400" x-text="svc.version"></span>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Confidence & Timestamps -->
            <div class="grid grid-cols-3 gap-4 border-t border-gray-200 dark:border-gray-600 pt-3">
              <div>
                <div class="text-xs text-gray-500 dark:text-gray-400 uppercase">Confidence</div>
                <div class="flex items-center gap-2 mt-1">
                  <div class="w-16 h-2 bg-gray-200 dark:bg-gray-600 rounded-full overflow-hidden">
                    <div class="h-full transition-all duration-300 rounded-full" :class="getConfidenceClass()"
                      :style="getConfidenceStyle()">
                    </div>
                  </div>
                  <span class="text-sm font-medium text-gray-900 dark:text-white"
                    x-text="getConfidenceLabel(promoteDevice)"></span>
                </div>
              </div>
              <div>
                <div class="text-xs text-gray-500 dark:text-gray-400 uppercase">First Seen</div>
                <div class="text-sm text-gray-700 dark:text-gray-300" x-text="formatDate(getPromoteFirstSeen())"></div>
              </div>
              <div>
                <div class="text-xs text-gray-500 dark:text-gray-400 uppercase">Last Seen</div>
                <div class="text-sm text-gray-700 dark:text-gray-300" x-text="formatDate(getPromoteLastSeen())"></div>
              </div>
            </div>

            <!-- Promoted indicator -->
            <template x-if="hasPromoted()">
              <div class="border-t border-gray-200 dark:border-gray-600 pt-3">
                <div class="flex items-center gap-2 text-green-600 dark:text-green-400">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                  </svg>
                  <span class="text-sm font-medium">Already promoted to device</span>
                </div>
              </div>
            </template>
          </div>

          <!-- Device Name Input -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Device Name *</label>
            <input type="text" x-model="promoteName" required
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Enter a name for this device">
          </div>

          <!-- Datacenter Selection -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Datacenter</label>
            <select x-model="promoteDatacenterId"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Select a datacenter (optional)</option>
              <template x-for="dc in datacenters" :key="dc.id">
                <option :value="dc.id" x-text="dc.name"></option>
              </template>
            </select>
          </div>

          <!-- Make/Model -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Make/Model</label>
            <input type="text" x-model="promoteMakeModel"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
              :placeholder="getPromoteVendorPlaceholder()">
          </div>
        </div>

        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-200 dark:border-gray-700">
          <button type="button" @click="showPromoteModal = false"
            class="px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">Cancel</button>
          <button type="submit" :disabled="promoting || hasPromoted()"
            class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">
            <span x-show="!promoting">Promote Device</span>
            <span x-show="promoting">Promoting...</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
