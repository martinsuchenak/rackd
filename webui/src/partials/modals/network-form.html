<div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-black/50" @click="closeModal()"></div>
  <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4" x-text="isEditMode ? 'Edit Network' : 'Add Network'"></h3>
    <form @submit.prevent="saveNetwork()">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name *</label>
          <input type="text" x-model="editNetwork.name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Subnet (CIDR) *</label>
          <input type="text" x-model="editNetwork.subnet" required placeholder="e.g. 10.0.0.0/24" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">VLAN ID</label>
          <input type="number" x-model.number="editNetwork.vlan_id" min="0" max="4094" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
          <textarea x-model="editNetwork.description" rows="2" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <div x-show="hasMultipleDatacenters">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Datacenter</label>
          <select x-model="editNetwork.datacenter_id" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">None</option>
            <template x-for="dc in datacenters" :key="dc.id">
              <option :value="dc.id" x-text="dc.name"></option>
            </template>
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button type="button" @click="closeModal()" class="px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">Cancel</button>
        <button type="submit" :disabled="saving" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50">
          <span x-show="!saving" x-text="isEditMode ? 'Save Changes' : 'Create Network'"></span>
          <span x-show="saving" x-text="isEditMode ? 'Saving...' : 'Creating...'"></span>
        </button>
      </div>
    </form>
  </div>
</div>
