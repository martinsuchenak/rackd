<div x-show="showPoolModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="pool-modal-title" @keydown.escape.window="closePoolModal()">
  <div class="fixed inset-0 bg-black/50" @click="closePoolModal()" aria-hidden="true"></div>
  <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6" x-trap.inert.noscroll="showPoolModal">
    <button @click="closePoolModal()" class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-gray-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded-full p-2 cursor-pointer transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center" aria-label="Close dialog">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <h2 id="pool-modal-title" class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-4" x-text="isEditPool ? 'Edit Pool' : 'Add Pool'"></h2>
    <form @submit.prevent="savePool()">
      <div class="space-y-4">
        <div>
          <label for="pool-name" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Name <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
          <input id="pool-name" type="text" x-model="editPool.name" required aria-required="true" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="pool-start-ip" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Start IP <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
            <input id="pool-start-ip" type="text" x-model="editPool.start_ip" required aria-required="true" placeholder="e.g., 192.168.1.10" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
          </div>
          <div>
            <label for="pool-end-ip" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">End IP <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
            <input id="pool-end-ip" type="text" x-model="editPool.end_ip" required aria-required="true" placeholder="e.g., 192.168.1.50" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
          </div>
        </div>
        <div>
          <label for="pool-gateway" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Gateway</label>
          <input id="pool-gateway" type="text" x-model="editPool.gateway" placeholder="e.g., 192.168.1.1" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <div>
          <label for="pool-dns" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">DNS Servers</label>
          <input id="pool-dns" type="text" x-model="editPool.dns_servers" placeholder="e.g., 8.8.8.8, 8.8.4.4" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
        </div>
        <div>
          <label for="pool-tag-input" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Tags</label>
          <div class="flex flex-wrap gap-2 mb-2" role="list" aria-label="Added tags">
            <template x-for="(tag, idx) in (editPool.tags || [])" :key="idx">
              <span class="inline-flex items-center px-2 py-1 text-sm bg-blue-100 dark:bg-blue-900 text-blue-900 dark:text-blue-100 rounded" role="listitem">
                <span x-text="tag"></span>
                <button type="button" @click="editPool.tags = editPool.tags.filter((_, i) => i !== idx)" class="ml-1 p-1 text-blue-800 dark:text-blue-200 hover:text-blue-900 dark:hover:text-blue-100 focus:outline-none focus:ring-[3px] focus:ring-blue-500 rounded min-w-[24px] min-h-[24px]" :aria-label="'Remove tag ' + tag">&times;</button>
              </span>
            </template>
          </div>
          <div class="flex gap-2">
            <input id="pool-tag-input" type="text" x-ref="poolTagInput" @keydown.enter.prevent="if ($refs.poolTagInput.value.trim()) { editPool.tags = [...(editPool.tags || []), $refs.poolTagInput.value.trim()]; $refs.poolTagInput.value = ''; }" placeholder="Add tag..." class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">
            <button type="button" @click="if ($refs.poolTagInput.value.trim()) { editPool.tags = [...(editPool.tags || []), $refs.poolTagInput.value.trim()]; $refs.poolTagInput.value = ''; }" class="px-3 py-2 text-sm bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-gray-200 rounded-md hover:bg-gray-300 dark:hover:bg-gray-500 focus:outline-none focus:ring-[3px] focus:ring-blue-500 min-h-[44px]">Add</button>
          </div>
        </div>
        <div>
          <label for="pool-description" class="block text-sm font-medium text-gray-800 dark:text-gray-200 mb-1">Description</label>
          <textarea id="pool-description" x-model="editPool.description" rows="2" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button type="button" @click="closePoolModal()" class="px-4 py-2 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-[3px] focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">Cancel</button>
        <button type="submit" :disabled="savingPool" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-[3px] focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors min-h-[44px]">
          <span x-show="!savingPool" x-text="isEditPool ? 'Save Changes' : 'Create Pool'"></span>
          <span x-show="savingPool">Saving...</span>
        </button>
      </div>
    </form>
  </div>
</div>
