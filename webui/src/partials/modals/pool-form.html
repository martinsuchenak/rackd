<div x-show="showPoolModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="pool-modal-title" @keydown.escape.window="closePoolModal()">
  <div class="fixed inset-0 bg-black/50" @click="closePoolModal()" aria-hidden="true"></div>
  <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full p-6">
    <button @click="closePoolModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-full p-1 cursor-pointer transition-colors" aria-label="Close dialog">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <h2 id="pool-modal-title" class="text-lg font-semibold text-gray-900 dark:text-white mb-4" x-text="isEditPool ? 'Edit Pool' : 'Add Pool'"></h2>
    <form @submit.prevent="savePool()">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name *</label>
          <input type="text" x-model="editPool.name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Start IP *</label>
            <input type="text" x-model="editPool.start_ip" required placeholder="e.g., 192.168.1.10" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">End IP *</label>
            <input type="text" x-model="editPool.end_ip" required placeholder="e.g., 192.168.1.50" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Gateway</label>
          <input type="text" x-model="editPool.gateway" placeholder="e.g., 192.168.1.1" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">DNS Servers</label>
          <input type="text" x-model="editPool.dns_servers" placeholder="e.g., 8.8.8.8, 8.8.4.4" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tags</label>
          <div class="flex flex-wrap gap-2 mb-2">
            <template x-for="(tag, idx) in (editPool.tags || [])" :key="idx">
              <span class="inline-flex items-center px-2 py-1 text-sm bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded">
                <span x-text="tag"></span>
                <button type="button" @click="editPool.tags = editPool.tags.filter((_, i) => i !== idx)" class="ml-1 text-blue-600 dark:text-blue-400 hover:text-blue-800">&times;</button>
              </span>
            </template>
          </div>
          <div class="flex gap-2">
            <input type="text" x-ref="poolTagInput" @keydown.enter.prevent="if ($refs.poolTagInput.value.trim()) { editPool.tags = [...(editPool.tags || []), $refs.poolTagInput.value.trim()]; $refs.poolTagInput.value = ''; }" placeholder="Add tag..." class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" @click="if ($refs.poolTagInput.value.trim()) { editPool.tags = [...(editPool.tags || []), $refs.poolTagInput.value.trim()]; $refs.poolTagInput.value = ''; }" class="px-3 py-2 text-sm bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-md hover:bg-gray-300 dark:hover:bg-gray-500">Add</button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
          <textarea x-model="editPool.description" rows="2" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button type="button" @click="closePoolModal()" class="px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">Cancel</button>
        <button type="submit" :disabled="savingPool" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer transition-colors">
          <span x-show="!savingPool" x-text="isEditPool ? 'Save Changes' : 'Create Pool'"></span>
          <span x-show="savingPool">Saving...</span>
        </button>
      </div>
    </form>
  </div>
</div>
